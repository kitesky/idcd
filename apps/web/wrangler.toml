name = "idcd-web"
main = ".open-next/worker.js"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# 静态资源绑定（CSS/JS/图片等）
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# 生产环境变量（敏感值在 Cloudflare Dashboard 的 Workers → Settings → Variables 中配置）
[vars]
NEXT_PUBLIC_API_URL = "https://api.idcd.com"

# 路由规则：idcd.com 全站流量走此 Worker
[[routes]]
pattern = "idcd.com/*"
zone_name = "idcd.com"
