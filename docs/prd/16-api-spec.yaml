# =====================================================================
# x-mcp-protocol — MCP 协议附录(非 OpenAPI;描述性文档)
# =====================================================================
x-mcp-protocol:
  description: |
    `mcp.idcd.com` 走 **Anthropic MCP protocol**(JSON-RPC over stdio + HTTP+SSE),
    与 OpenAPI 3.1 不直接兼容,因此**不在本规范的 paths 中暴露**。
    本节作为描述性附录,供 SDK / 文档生成器参考。

    完整规范见 `docs.mcp.idcd.com`(独立子域,D3)。`mcp.idcd.com/docs` 走 302 redirect。

  protocol: anthropic-mcp
  protocol_version: "2024-11-05"

  transports:
    - name: stdio
      description: 主流;用于 Cursor / Claude Code / Codex / 自家 SDK 本地客户端
    - name: http+sse
      description: |
        长连 SSE(D13 stateful);LB sticky session 必要;
        单实例 10k 并发;多实例横向扩展跨实例事件通过 Redis Streams 广播。

  auth:
    method: bearer_mcp_token
    description: |
      Header `Authorization: Bearer mcpt_xxx`;
      token 通过 `POST /v1/mcp/tokens`(在 `api.idcd.com`)签发,
      详 §components.schemas.McpToken + §Auth/MCP Tokens tag。
    constraints:
      - 所有 token 必有 expires_at,最长 90 天(D2)
      - personal 24h auto-refresh
      - workspace 90d auto_renewal
      - service 90d auto_renewal + IP 白名单强制
      - 撤销立即生效:active SSE 连接通过 Redis pub-sub broadcast 断开

  pricing:
    unit_cny: 0.002
    notes: |
      MCP units 与 API calls 是两条独立配额池(D2)。
      Free 100/day, Pro 5k/day, Team 30k/day, Business 200k/day, Agent Pro 1M/day(独立加大 SKU)。

  tools:
    - name: idcd_ping
      units: 1
      description: 多地 Ping(指定/默认节点选择)
    - name: idcd_http_probe
      units: 2
      description: 多地 HTTP/HTTPS 拨测
    - name: idcd_dns_resolve
      units: 2
      description: 多地 DNS 解析 + 污染检测
    - name: idcd_traceroute
      units: 3
      description: 多地路由追踪
    - name: idcd_ssl_cert
      units: 1
      description: SSL 证书查询 + 安全评分
    - name: idcd_diagnose
      units: 10
      description: 一键全面诊断
    - name: idcd_ip_info
      units: 1
      description: IP 归属 / ASN / ISP 查询
    - name: idcd_whois
      units: 1
      description: WHOIS 查询
    - name: idcd_icp
      units: 1
      description: ICP 备案查询
    - name: idcd_create_monitor
      units: 0
      description: 创建监控项(需 API key 权限;触发订阅档计费)
    - name: idcd_check_monitor
      units: 1
      description: 查询监控历史
    - name: idcd_generate_verdict
      units: 0
      description: 触发 Verdict 报告生成(报告本身按 K5 件价计费,不消耗 MCP units)
    - name: idcd_list_nodes
      units: 0
      description: 列出可用节点(transparency 公开)

  clients_supported:
    - { name: Claude Code, transport: [stdio, "http+sse"], status: S3 alpha }
    - { name: Cursor, transport: [stdio], status: S3 alpha }
    - { name: Codex CLI, transport: [stdio], status: S3 GA }
    - { name: Anthropic Console MCP Gallery, transport: ["http+sse"], status: S3 GA }
    - { name: idcd-mcp-py (自家 SDK), transport: [stdio, "http+sse"], status: S3 GA }
    - { name: idcd-mcp-ts (自家 SDK), transport: [stdio, "http+sse"], status: S3 GA }

  links:
    docs: https://docs.mcp.idcd.com
    quickstart: https://docs.mcp.idcd.com/quickstart
    tool_reference: https://docs.mcp.idcd.com/tools
