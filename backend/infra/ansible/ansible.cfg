[defaults]
inventory          = inventory/hosts.yml
roles_path         = roles
collections_paths  = ~/.ansible/collections
forks              = 20
pipelining         = true
# host_key_checking ON — protects against MITM during agent provisioning.
# Bootstrap workflow: ssh-keyscan the new node into ~/.ssh/known_hosts (or
# inventory/known_hosts) BEFORE running this playbook. CI should publish
# the expected fingerprints out-of-band (e.g. cloud provider metadata).
host_key_checking  = true
timeout            = 30
retry_files_enabled = false
stdout_callback    = yaml
stderr_callback    = yaml

[ssh_connection]
# accept-new = first connection auto-trusts, subsequent ones verify; this
# matches the bootstrap-then-trust workflow above without silently
# accepting changes mid-flight (which would mask a MITM swap).
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=accept-new
pipelining = true
