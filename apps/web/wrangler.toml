# Cloudflare Workers 配置（@opennextjs/cloudflare）
#
# 部署命令:
#   pnpm exec wrangler deploy --env staging
#   pnpm exec wrangler deploy --env production
#
# Secrets（不在本文件，用 wrangler secret put 注入）:
#   ADMIN_TOKEN              — admin 后台调用 /internal/admin/* 的 service token
#   INTERNAL_API_TOKEN       — 服务端组件直连内网 API 的 token（如和 ADMIN_TOKEN 一致可省略）
#   PAYMENT_HUB_WEBHOOK_SECRET — 聚合支付 webhook 签名（如前端代理 webhook 才需要）
#   SENTRY_DSN               — Sentry SDK DSN（前端错误聚合）
#
# 设置 secret 示例:
#   pnpm exec wrangler secret put ADMIN_TOKEN --env production
#   pnpm exec wrangler secret put ADMIN_TOKEN --env staging

name = "idcd-web"
main = ".open-next/worker.js"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# 静态资源绑定（CSS/JS/图片等）
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# ─── 默认/开发环境 vars（pnpm exec wrangler dev 时生效）────────────────────────
# 注意：env-specific 段（staging / production）会**完全覆盖**本块，
# 不是合并；新加变量记得同步到下面三处。
[vars]
NEXT_PUBLIC_API_URL  = "http://localhost:8080"
INTERNAL_API_URL     = "http://localhost:8080"
IDCD_COOKIE_DOMAIN   = "localhost"
NEXT_PUBLIC_APP_ENV  = "development"

# ─── Staging ─────────────────────────────────────────────────────────────────
[env.staging]
name = "idcd-web-staging"

[env.staging.vars]
NEXT_PUBLIC_API_URL  = "https://api-staging.idcd.com"
INTERNAL_API_URL     = "https://api-staging.idcd.com"
IDCD_COOKIE_DOMAIN   = ".staging.idcd.com"
NEXT_PUBLIC_APP_ENV  = "staging"

# Paid plan 上调 CPU 上限到 5 min（默认 30s）。一键诊断 SSE 单流寿命
# ~50s wall（traceroute 决定），其中绝大多数是等 fetch、不计入 CPU；
# 留 5min 给后续可能加入的慢检测项（speedtest / 大文件下载）兜底。
[env.staging.limits]
cpu_ms = 300000

[[env.staging.routes]]
pattern   = "staging.idcd.com/*"
zone_name = "idcd.com"

[env.staging.assets]
directory = ".open-next/assets"
binding   = "ASSETS"

# ─── Production ──────────────────────────────────────────────────────────────
[env.production]
name = "idcd-web-production"

[env.production.vars]
NEXT_PUBLIC_API_URL  = "https://api.idcd.com"
# INTERNAL_API_URL 走内网/直连 api，避免走公网回环；如 CF Worker 必须经公网，
# 用 api.idcd.com（nginx 已加 X-Forwarded-* 头透传）。
INTERNAL_API_URL     = "https://api.idcd.com"
IDCD_COOKIE_DOMAIN   = ".idcd.com"
NEXT_PUBLIC_APP_ENV  = "production"

# 同 staging：把 CPU 上限拉到 paid plan 最大值 5 min。
[env.production.limits]
cpu_ms = 300000

# 路由规则：idcd.com 全站流量走 production worker
[[env.production.routes]]
pattern   = "idcd.com/*"
zone_name = "idcd.com"

[[env.production.routes]]
pattern   = "www.idcd.com/*"
zone_name = "idcd.com"

# status 子域（<slug>.status.idcd.com）由 src/proxy.ts 重写到 /status/<slug>
[[env.production.routes]]
pattern   = "*.status.idcd.com/*"
zone_name = "idcd.com"

[env.production.assets]
directory = ".open-next/assets"
binding   = "ASSETS"

# 注：一键诊断 SSE 单流寿命 ~50s（traceroute 决定），靠 paid plan +
# [env.*.limits] cpu_ms = 300_000 兜底。SSE wall-clock 在 paid plan 上无硬限制，
# 实际 CPU 主要消耗在 JSON encode 和 promise resolve（远低于 5min）。
# 多用户并发观察重点是 subrequest 数（每条 SSE ≈ 44 次 fetch，paid 上限 1000/请求）。
