openapi: 3.1.0
info:
  title: idcd.com Public API (v2)
  version: 2.0.0
  summary: |
    idcd.com 网络可观测平台 v2 三栈 API:Core(api.idcd.com)/ Evidence(attest.idcd.com)/
    MCP server(mcp.idcd.com,JSON-RPC,见附录)。本规范是 OpenAPI 3.1 source of truth,
    用于 SDK 自动生成、Mintlify 文档站、契约测试。
  description: |
    # idcd.com v2 公共 API 规范

    ## 三栈架构(v2 K1 锁定)

    | 子域 | 协议 | 用途 |
    |---|---|---|
    | `api.idcd.com` | HTTPS REST(本规范主体)| Core 拨测 / 监控 / 告警 / 账户 / 计费 |
    | `attest.idcd.com` | HTTPS REST(本规范 §Verdict/Attest)| Evidence-as-a-Service:Verdict 报告 / 公开验签 / 申诉 |
    | `mcp.idcd.com` | JSON-RPC over stdio + HTTP+SSE(**非 OpenAPI**)| MCP server 给 AI Agent;详 §MCP Protocol 附录 |

    三栈独立计量 / 独立 SLA / 独立 PRD 模块(详 OVERVIEW §5.2)。

    ## 锁定决策反映(v2)

    - **D2**:所有 MCP token 必有过期日,最长 90 天;MCP units 与 API 配额完全独立池
    - **D4**:Verdict 生成走 WAL 状态机;attestation_record UNIQUE(report_id, action)
    - **D5**:Verdict 失败 retry queue(5min/30min)+ 30min 强制道歉邮箱 + `refund_failed` 状态
    - **D6**:Self-verify 独立进程 / VPC subnet / KMS 客户端
    - **D-Concern1**:`/v1/attest/verify` 返回必含 `report_type=observation_only` + `legal_disclaimer`

    ## 鉴权速查

    - **API Key**:`X-API-Key: idc_live_xxx`(详 §components.securitySchemes.ApiKeyHeader)
    - **Bearer**:`Authorization: Bearer idc_live_xxx`(同 API Key,可二选一)
    - **MCP token**:走 `mcp.idcd.com`,**不是** API Key 体系(详 §Auth/MCP Tokens)
    - **Webhook receiver 签名**:`X-IDCD-Signature: t=<ts>,v1=<hmac>`

    ## 错误响应统一格式

    详 §components.schemas.Error。所有错误码列表见 16-api-spec.md §2.9。

    ## SDK 生成

    本 yaml 是 SDK 自动生成 source of truth;CI 通过 OpenAPI Generator + 自家模板生成
    JS / Go / Python SDK,人工 review 后发布。

  termsOfService: https://idcd.com/legal/terms
  contact:
    name: idcd.com API support
    url: https://idcd.com/support
    email: api@idcd.com
  license:
    name: Proprietary
    url: https://idcd.com/legal/terms

servers:
  - url: https://api.idcd.com/v1
    description: 生产环境 — Core REST API(api.idcd.com)
  - url: https://api-staging.idcd.com/v1
    description: 预生产 — Core REST API staging
  - url: https://attest.idcd.com/v1
    description: 生产环境 — Evidence(Verdict + Attestation + Dispute)独立子域;公开验签接口不需登录
  - url: https://attest-staging.idcd.com/v1
    description: 预生产 — Attestation staging

# MCP server 走 JSON-RPC over stdio + HTTP+SSE,与 OpenAPI 不直接兼容;详 §Auth/MCP Tokens
# 和文档底部 "x-mcp-protocol" 扩展节。

tags:
  - name: Auth
    description: 认证(注册 / 登录 / 2FA / session)
  - name: API Keys
    description: API Key 签发与管理(Core REST API 凭证)
  - name: MCP Tokens
    description: |
      MCP token 签发与管理(给 AI Agent / Cursor / Claude Code 使用)。
      **D2 锁定**:所有 token 最长 90 天,personal 24h auto-refresh,workspace/service 90d auto-renewal。
      service 强制 IP 白名单。MCP units 与 API 配额完全独立池。
  - name: Teams
    description: 团队 / 组织 / 成员
  - name: Probe
    description: 一次性拨测(http / ping / tcping / dns / traceroute / mtr / udp / speedtest / websocket)
  - name: Diagnose
    description: 一键全面诊断
  - name: Network Info
    description: IP / ASN / WHOIS / DNS / SSL / ICP / Headers 网络信息查询
  - name: Monitors
    description: 监控项(M01-M23,含 Agent obs 的 M21-M23)
  - name: Alerting
    description: 告警策略 / 事件 / 通道
  - name: Status Pages
    description: 状态页(私有管理 + 公开访问)
  - name: Reports
    description: SLA 报告 / 数据导出 / Dashboards
  - name: Heartbeat
    description: 心跳监控(被动接收 cron / batch 任务心跳)
  - name: Nodes
    description: 节点目录(公开;Verdict 报告引用的节点必在此可查)
  - name: Webhooks
    description: Webhook 接收端(outbound 事件订阅)
  - name: Billing
    description: 订阅 / 订单 / 发票 / 余额 / 用量(Core + Compliance + Agent Pro)
  - name: Plans
    description: 公开价格档位
  - name: Verdict
    description: |
      Evidence-as-a-Service:Verdict 件价报告订单 + 生成 + 分享。
      位于 `attest.idcd.com` 子域(K1)。状态机走 D4 WAL + D5 refund retry。
  - name: Attestation
    description: |
      Evidence-as-a-Service:公开验签 + 密钥仪式 transparency。
      `POST /v1/attest/verify` 不需登录(纯只读);其他 attestation 接口走 API Key。
      **D-Concern1**:验签响应必含 `report_type=observation_only` + `legal_disclaimer`。
  - name: Dispute
    description: |
      Verdict 报告申诉(被报告对象提出)。位于 `attest.idcd.com`。
      平台 24 小时内响应;违规报告下架 + 退款 + 公开 transparency 记录。
  - name: Compliance
    description: |
      Compliance 年订(starter ¥3k / pro ¥12k / enterprise ¥30k)+ 周/月度报告生成。
      位于 `attest.idcd.com`(年订生成的报告本质是周期性 Verdict)。
  - name: Agent Observability
    description: |
      AI Agent 工作流可观测(M21 LLM endpoint / M22 Tool/API / M23 RAG/Vector store)。
      事件流走 SSE long-lived(D13);LB sticky session by token_id;单实例 10k 并发。
  - name: MCP Usage
    description: MCP units 用量 + 计费明细;两条独立量表(MCP units / API calls)。
  - name: Leaderboard
    description: CDN / 云厂商排行榜厂商退出申请(K6 边界控制)。

security:
  - ApiKeyHeader: []
  - BearerAuth: []

paths:
  # =====================================================================
  # SECTION: Auth & Account
  # =====================================================================
  /auth/register:
    post:
      tags: [Auth]
      summary: 邮箱注册
      operationId: authRegister
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: 注册成功(需邮箱验证)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '409': { $ref: '#/components/responses/Conflict' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /auth/login:
    post:
      tags: [Auth]
      summary: 登录
      operationId: authLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /me:
    get:
      tags: [Auth]
      summary: 当前用户
      operationId: getMe
      responses:
        '200':
          description: 当前用户信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }

  # =====================================================================
  # SECTION: API Keys
  # =====================================================================
  /api-keys:
    get:
      tags: [API Keys]
      summary: 列出 API Key
      operationId: listApiKeys
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: API Key 列表(secret 不返回,只返回展示前缀)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyListResponse'
    post:
      tags: [API Keys]
      summary: 创建 API Key
      operationId: createApiKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApiKeyRequest'
      responses:
        '201':
          description: 创建成功(secret 仅返回一次,务必保存)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateApiKeyResponse'
        '400': { $ref: '#/components/responses/BadRequest' }

  /api-keys/{id}:
    parameters:
      - $ref: '#/components/parameters/ResourceId'
    delete:
      tags: [API Keys]
      summary: 撤销 API Key
      operationId: revokeApiKey
      responses:
        '204':
          description: 撤销成功
        '404': { $ref: '#/components/responses/NotFound' }

  # =====================================================================
  # SECTION: Probe (一次性拨测,详 08 §5)
  # =====================================================================
  /probe/http:
    post:
      tags: [Probe]
      summary: 多地 HTTP/HTTPS 拨测
      operationId: probeHttp
      description: |
        从指定节点池或指定节点 ID 发起 HTTP 拨测;支持 sync(默认,等待结果)/ async(callback_url)。
        权重 3。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HttpProbeRequest'
      responses:
        '200':
          description: 拨测结果(sync)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpProbeResponse'
        '202':
          description: 拨测已入队(async)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProbeTaskAccepted'
        '400': { $ref: '#/components/responses/BadRequest' }
        '422': { $ref: '#/components/responses/Unprocessable' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /probe/ping:
    post:
      tags: [Probe]
      summary: 多地 Ping
      operationId: probePing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PingProbeRequest'
      responses:
        '200':
          description: Ping 结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PingProbeResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /probe/tcping:
    post:
      tags: [Probe]
      summary: 多地 TCP Ping
      operationId: probeTcping
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TcpingProbeRequest'
      responses:
        '200':
          description: TCP Ping 结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PingProbeResponse'

  /probe/dns:
    post:
      tags: [Probe]
      summary: 多地 DNS 解析
      operationId: probeDns
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DnsProbeRequest'
      responses:
        '200':
          description: DNS 解析结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DnsProbeResponse'

  /probe/traceroute:
    post:
      tags: [Probe]
      summary: 多地路由追踪
      operationId: probeTraceroute
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TracerouteRequest'
      responses:
        '200':
          description: Traceroute 结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TracerouteResponse'

  /probe/tasks/{id}:
    parameters:
      - $ref: '#/components/parameters/ResourceId'
    get:
      tags: [Probe]
      summary: 查询拨测任务状态(async)
      operationId: getProbeTask
      responses:
        '200':
          description: 任务状态 + 结果(若已完成)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpProbeResponse'

  # =====================================================================
  # SECTION: Diagnose
  # =====================================================================
  /diagnose:
    post:
      tags: [Diagnose]
      summary: 一键全面诊断
      operationId: createDiagnose
      description: 权重 20。包含多协议拨测 + 多地节点 + 综合分析。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiagnoseRequest'
      responses:
        '202':
          description: 诊断已入队(async)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProbeTaskAccepted'

  /diagnose/{id}:
    parameters:
      - $ref: '#/components/parameters/ResourceId'
    get:
      tags: [Diagnose]
      summary: 诊断状态 + 结果
      operationId: getDiagnose
      responses:
        '200':
          description: 诊断详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiagnoseResponse'

  # =====================================================================
  # SECTION: Network Info
  # =====================================================================
  /ip/{ip}:
    parameters:
      - name: ip
        in: path
        required: true
        schema: { type: string }
        example: "1.1.1.1"
    get:
      tags: [Network Info]
      summary: IP 归属信息
      operationId: getIpInfo
      responses:
        '200':
          description: IP info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IpInfoResponse'

  /whois/{domain}:
    parameters:
      - name: domain
        in: path
        required: true
        schema: { type: string }
        example: example.com
    get:
      tags: [Network Info]
      summary: WHOIS 查询
      operationId: getWhois
      responses:
        '200':
          description: WHOIS 数据
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WhoisResponse'

  /icp/{domain}:
    parameters:
      - name: domain
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [Network Info]
      summary: ICP 备案查询
      operationId: getIcp
      responses:
        '200':
          description: ICP 备案信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IcpResponse'

  /ssl:
    get:
      tags: [Network Info]
      summary: SSL 证书查询
      operationId: getSsl
      parameters:
        - name: host
          in: query
          required: true
          schema: { type: string }
        - name: port
          in: query
          schema: { type: integer, default: 443 }
      responses:
        '200':
          description: SSL 证书 + 评分
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SslResponse'

  # =====================================================================
  # SECTION: Monitors
  # =====================================================================
  /monitors:
    get:
      tags: [Monitors]
      summary: 列出监控项
      operationId: listMonitors
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: type
          in: query
          schema:
            type: string
            enum: [http, ping, tcping, dns, ssl, domain, icp, keyword, json, heartbeat, browser]
        - name: status
          in: query
          schema: { type: string, enum: [up, down, degraded, paused] }
      responses:
        '200':
          description: 监控项列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitorListResponse'
    post:
      tags: [Monitors]
      summary: 创建监控项
      operationId: createMonitor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMonitorRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitorResponse'

  /monitors/{id}:
    parameters:
      - $ref: '#/components/parameters/ResourceId'
    get:
      tags: [Monitors]
      summary: 监控项详情
      operationId: getMonitor
      responses:
        '200':
          description: 监控项详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitorResponse'
    patch:
      tags: [Monitors]
      summary: 更新监控项
      operationId: updateMonitor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMonitorRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitorResponse'
    delete:
      tags: [Monitors]
      summary: 删除监控项
      operationId: deleteMonitor
      responses:
        '204':
          description: 删除成功

  /monitors/{id}/checks:
    parameters:
      - $ref: '#/components/parameters/ResourceId'
      - $ref: '#/components/parameters/FromTime'
      - $ref: '#/components/parameters/ToTime'
      - name: limit
        in: query
        schema: { type: integer, maximum: 1000, default: 100 }
    get:
      tags: [Monitors]
      summary: 监控项历史检查
      operationId: getMonitorChecks
      responses:
        '200':
          description: 检查历史(时序数据)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitorChecksResponse'

  # =====================================================================
  # SECTION: Alerting
  # =====================================================================
  /alert-policies:
    get:
      tags: [Alerting]
      summary: 列出告警策略
      operationId: listAlertPolicies
      responses:
        '200':
          description: 告警策略列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertPolicyListResponse'
    post:
      tags: [Alerting]
      summary: 创建告警策略
      operationId: createAlertPolicy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertPolicy'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertPolicy'

  /alert-events:
    get:
      tags: [Alerting]
      summary: 列出告警事件
      operationId: listAlertEvents
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: state
          in: query
          schema: { type: string, enum: [open, ack, resolved] }
      responses:
        '200':
          description: 告警事件列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertEventListResponse'

  /alert-events/{id}/acknowledge:
    parameters:
      - $ref: '#/components/parameters/ResourceId'
    post:
      tags: [Alerting]
      summary: Ack 告警
      operationId: ackAlertEvent
      responses:
        '200':
          description: Ack 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertEvent'

  # =====================================================================
  # SECTION: Status Pages (公开 + 私有)
  # =====================================================================
  /status-pages:
    get:
      tags: [Status Pages]
      summary: 列出状态页
      operationId: listStatusPages
      responses:
        '200':
          description: 状态页列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusPageListResponse'

  /status/{slug}/summary:
    parameters:
      - name: slug
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [Status Pages]
      summary: 状态页公开摘要(无需鉴权)
      operationId: getStatusPageSummary
      security: []
      responses:
        '200':
          description: 公开摘要
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusPageSummary'

  # =====================================================================
  # SECTION: Reports / Dashboards
  # =====================================================================
  /reports/sla:
    get:
      tags: [Reports]
      summary: SLA 报告
      operationId: getSlaReport
      parameters:
        - name: period
          in: query
          required: true
          schema: { type: string, pattern: '^\d{4}-\d{2}$' }
          example: '2026-04'
      responses:
        '200':
          description: SLA 报告
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlaReport'

  # =====================================================================
  # SECTION: Heartbeat
  # =====================================================================
  /heartbeat/{token}:
    parameters:
      - name: token
        in: path
        required: true
        schema: { type: string }
    post:
      tags: [Heartbeat]
      summary: 接收心跳(被动监控)
      operationId: postHeartbeat
      security: []
      responses:
        '204':
          description: 心跳已接收

  # =====================================================================
  # SECTION: Nodes (公开)
  # =====================================================================
  /nodes:
    get:
      tags: [Nodes]
      summary: 列出公开节点目录
      operationId: listNodes
      security: []
      responses:
        '200':
          description: 节点目录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeListResponse'

  /nodes/{id}:
    parameters:
      - $ref: '#/components/parameters/ResourceId'
    get:
      tags: [Nodes]
      summary: 节点详情
      operationId: getNode
      security: []
      responses:
        '200':
          description: 节点详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'

  # =====================================================================
  # SECTION: Billing
  # =====================================================================
  /billing/subscription:
    get:
      tags: [Billing]
      summary: 当前订阅
      operationId: getSubscription
      responses:
        '200':
          description: 当前订阅档位 + 用量
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'

  /billing/usage:
    get:
      tags: [Billing]
      summary: 用量统计
      operationId: getUsage
      parameters:
        - name: period
          in: query
