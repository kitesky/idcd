<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置密码</title>
    <style>
        body { margin: 0; padding: 0; background-color: #f4f4f4; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .container { width: 100%; max-width: 600px; margin: 0 auto; background-color: #ffffff; }
        .header { background-color: #2563eb; padding: 20px; text-align: center; }
        .logo { color: #ffffff; font-size: 24px; font-weight: bold; }
        .content { padding: 40px 20px; text-align: center; }
        .alert-box { background-color: #fef3c7; border: 2px solid #f59e0b; border-radius: 8px; padding: 20px; margin: 20px 0; }
        .alert-icon { font-size: 32px; margin-bottom: 10px; }
        .reset-button { display: inline-block; background-color: #dc2626; color: white; text-decoration: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; margin: 30px 0; font-size: 16px; }
        .reset-button:hover { background-color: #b91c1c; }
        .url-box { background-color: #f8fafc; border: 1px solid #e5e7eb; border-radius: 6px; padding: 15px; margin: 20px 0; word-break: break-all; font-family: monospace; font-size: 12px; color: #6b7280; }
        .expires { color: #dc2626; font-weight: bold; margin-top: 20px; }
        .security-tips { background-color: #f0f9ff; border-left: 4px solid #0ea5e9; padding: 15px; margin: 30px 0; text-align: left; }
        .security-tips h4 { margin: 0 0 10px 0; color: #0c4a6e; }
        .security-tips ul { margin: 10px 0; padding-left: 20px; color: #475569; }
        .footer { background-color: #f8fafc; padding: 20px; text-align: center; color: #6b7280; font-size: 12px; border-top: 1px solid #e5e7eb; }
        @media (max-width: 600px) {
            .content { padding: 30px 15px; }
            .reset-button { padding: 12px 20px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">idcd</div>
        </div>
        <div class="content">
            <div class="alert-box">
                <div class="alert-icon">🔒</div>
                <h2 style="margin: 0 0 10px 0; color: #92400e;">密码重置请求</h2>
                <p style="margin: 0; color: #92400e; font-size: 14px;">我们收到了您的密码重置请求</p>
            </div>

            <p style="color: #4b5563; line-height: 1.6; margin-bottom: 30px;">
                点击下方按钮重置您的密码。如果这不是您本人的操作，请忽略此邮件。
            </p>

            <a href="{{.ResetURL}}" class="reset-button">重置密码</a>

            <p class="expires">⏰ 此链接将在 {{.ExpiresIn}} 后过期</p>

            <div class="security-tips">
                <h4>🛡️ 安全提醒</h4>
                <ul style="font-size: 14px;">
                    <li>此链接仅可使用一次，使用后自动失效</li>
                    <li>请不要将此链接分享给任何人</li>
                    <li>设置新密码时，建议使用强密码组合</li>
                    <li>如有异常，请立即联系客服</li>
                </ul>
            </div>

            <p style="color: #6b7280; font-size: 14px; margin-top: 30px;">
                如果按钮无法点击，请复制以下链接到浏览器地址栏：
            </p>
            <div class="url-box">{{.ResetURL}}</div>

            <p style="color: #6b7280; font-size: 14px; margin-top: 40px;">
                如果您没有请求重置密码，请忽略此邮件或 <a href="mailto:security@idcd.com" style="color: #dc2626;">联系我们</a>
            </p>
        </div>
        <div class="footer">
            © 2026 idcd.com - 专业网络诊断工具<br>
            此邮件由系统自动发送，请勿回复
        </div>
    </div>
</body>
</html>
