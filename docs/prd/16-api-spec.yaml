              schema:
                $ref: '#/components/schemas/AgentObsMonitorListResponse'
    post:
      tags: [Agent Observability]
      summary: 创建 Agent obs 监控项
      operationId: createAgentObsMonitor
      description: |
        创建监控类型:
        - **M21 LLM Endpoint Health** — OpenAI / Anthropic / Bedrock / 自家 LLM;
          **强制要求 `budget_per_check_usd`**(防爆账单);
        - **M22 Tool/API Endpoint** — Agent 调用的工具 / API(MCP server / 自家 webhook)
        - **M23 RAG/Vector Store** — Qdrant / Pinecone / pgvector / Elastic
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAgentObsMonitorRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentObsMonitor'

  /agent-obs/monitors/{id}:
    parameters:
      - $ref: '#/components/parameters/ResourceId'
    get:
      tags: [Agent Observability]
      summary: Agent obs 监控项详情
      operationId: getAgentObsMonitor
      responses:
        '200':
          description: 详情(含 budget 统计 / 当月花费)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentObsMonitor'

  /agent-obs/events:
    get:
      tags: [Agent Observability]
      summary: Agent obs 事件流(SSE long-lived)
      operationId: streamAgentObsEvents
      description: |
        **长连 SSE 接口**(text/event-stream),**非常规 HTTP GET**。

        **D13 状态边界**:本端点是 SSE long-lived;LB 必须基于 `Authorization` token_id 做 sticky session,
        否则跨实例重连导致事件丢失。单实例支持 10k 并发连接(详 14 §9.1)。

        多实例横向扩展:跨实例事件通过 Redis Streams 广播,客户端不感知。

        **使用方式**:
        ```
        GET /v1/agent-obs/events?monitor_id=aom_xyz&from=2026-05-13T00:00:00Z
        Accept: text/event-stream
        Authorization: Bearer idc_live_xxx
        ```

        服务端推送格式:
        ```
        event: agent_obs.event
        data: {"id": "aoe_abc", "monitor_id": "aom_xyz", ...}
        ```

        客户端断线后用 `Last-Event-ID` header 续传。
      parameters:
        - name: monitor_id
          in: query
          schema: { type: string }
        - name: from
          in: query
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: SSE 事件流(text/event-stream)
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/AgentObsEventStreamFrame'

  # =====================================================================
  # SECTION: MCP USAGE (D2 锁定:与 API 配额独立池)
  # =====================================================================
  /mcp/usage:
    get:
      tags: [MCP Usage]
      summary: MCP 用量 + 计费明细
      operationId: getMcpUsage
      description: |
        **D2 锁定**:MCP units 配额池与 API 调用配额池**完全独立**。用户控制台看到两条独立量表:
        `mcp_units_used` 与 `api_calls_used` 各自有 quota / remaining / reset。

        档位独立 MCP units 额度:Free 100/day, Pro 5k/day, Team 30k/day, Business 200k/day,
        Agent Pro 1M/day(独立加大 SKU, S3 GA)。1 unit ≈ ¥0.002。

        响应同时返回:
        - **本期总用量**(units / cost CNY)
        - **按 tool 拆分**(idcd_ping / idcd_http_probe / ...)
        - **按 client_id 拆分**(Cursor / ClaudeCode / Codex / sdk-py / sdk-ts / other)
        - **按时间序列**(daily breakdown,可下钻 hourly)
      parameters:
        - name: period
          in: query
          schema: { type: string, pattern: '^\d{4}-\d{2}$' }
          example: '2026-05'
        - name: group_by
          in: query
          schema:
            type: string
            enum: [tool, client, day, hour]
            default: tool
      responses:
        '200':
          description: 用量 + 计费明细
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/McpUsageResponse'

