  # =====================================================================
  # SECTION: ATTESTATION (公开验签 + transparency)
  # =====================================================================
  /attest/verify:
    post:
      tags: [Attestation]
      servers:
        - url: https://attest.idcd.com/v1
      summary: 公开 PDF 验签
      operationId: verifyAttestation
      security: []
      description: |
        任何第三方可上传由 idcd.com 签发的 Verdict PDF,系统提取嵌入签名 + 时间戳,
        返回验证结果。**不需登录,纯只读,不限频**。

        **D-Concern1 响应必含**:`report_type`(默认 `observation_only`)+ `legal_disclaimer`,
        明确告知第三方"本报告是一手观测数据,不是司法鉴定结论"。

        实施细节:根据请求中报告 metadata 中的 `signature_key_id + key_version`,从 KMS
        GetPublicKey 拉取对应版本 public key(撤销 / 过期 key 仍保留 public key 只读),
        因此 revoke 期间历史报告仍可正常验签。
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [pdf]
              properties:
                pdf:
                  type: string
                  format: binary
                  description: 待验签的 PDF 文件
      responses:
        '200':
          description: 验签结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttestVerifyResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '413': { $ref: '#/components/responses/PayloadTooLarge' }

  /attest/key/{key_id}:
    parameters:
      - name: key_id
        in: path
        required: true
        schema: { type: string }
    servers:
      - url: https://attest.idcd.com/v1
    get:
      tags: [Attestation]
      summary: 查询签名公钥 + 元数据
      operationId: getAttestKey
      security: []
      description: |
        返回指定 sign key 的 public key + 元数据(版本 / 创建时间 / 撤销状态 / 仪式记录)。
        撤销的 key 仍可查询 public key(只读),用于历史报告验签。
      responses:
        '200':
          description: 公钥 + 元数据
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttestKeyResponse'
        '404': { $ref: '#/components/responses/NotFound' }

  /attest/ceremony:
    servers:
      - url: https://attest.idcd.com/v1
    get:
      tags: [Attestation]
      summary: 密钥仪式公开记录(transparency)
      operationId: listKeyCeremony
      security: []
      description: |
        借鉴 DNSSEC root key ceremony 范式作为信任背书;公开 root key 生成 / 切分 /
        sign key 轮换 / 应急撤销 的完整历史 + 录像 / 公证 PDF 链接。
      parameters:
        - name: action
          in: query
          schema:
            type: string
            enum: [root_gen, root_split, sign_key_rotate, emergency_revoke]
      responses:
        '200':
          description: 仪式记录列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KeyCeremonyListResponse'

