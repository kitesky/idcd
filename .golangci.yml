version: "2"

run:
  timeout: 5m
  go: '1.26'

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - misspell
    - ineffassign

  settings:
    errcheck:
      check-blank: false
      check-type-assertions: false

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
      - path: cmd/
        linters:
          - errcheck

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
