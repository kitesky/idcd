version: "2"

run:
  timeout: 5m
  go: '1.26'

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck       # also covers gosimple rules in v2 (merged upstream)
    - unused
    - misspell
    - ineffassign
    - bodyclose         # P3: net/http response body close — clear bug catcher

  settings:
    errcheck:
      check-blank: false
      check-type-assertions: false

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - bodyclose   # tests may legitimately leak bodies in synthetic flows
      - path: cmd/
        linters:
          - errcheck
      - linters: [errcheck]
        text: 'Error return value of `[^`]+\.(Close|SetReadDeadline|SetWriteDeadline)` is not checked'

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
