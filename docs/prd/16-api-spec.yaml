              items: { $ref: '#/components/schemas/StatusPage' }

    StatusPageSummary:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              type: object
              properties:
                slug: { type: string }
                name: { type: string }
                status: { type: string, enum: [operational, degraded, partial_outage, major_outage] }
                components:
                  type: array
                  items: { type: object, additionalProperties: true }
                active_incidents:
                  type: array
                  items: { type: object, additionalProperties: true }

    # ---------- Reports ----------
    SlaReport:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              type: object
              properties:
                period: { type: string, example: "2026-04" }
                uptime_pct: { type: number }
                total_incidents: { type: integer }
                total_downtime_minutes: { type: integer }

    # ---------- Nodes ----------
    Node:
      type: object
      properties:
        id: { type: string, example: nd_jp_tk_01_vultr }
        country: { type: string }
        city: { type: string }
        isp: { type: string }
        asn: { type: integer }
        region: { type: string }
        provider: { type: string }
        status: { type: string, enum: [healthy, degraded, unhealthy, offline] }
        tags:
          type: array
          items: { type: string }
        confidence_label:
          type: string
          enum: [high, medium, low]
          description: |
            Anchor 节点偏差检测后的可信度分类(详 10 §6.5,D10);
            `low` 节点不参与 Verdict 报告生成(详 18 §3.2 step 2)。

    NodeListResponse:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/Node' }

    # ---------- Webhooks ----------
    CreateWebhookEndpointRequest:
      type: object
      required: [url, events]
      properties:
        url: { type: string, format: uri }
        events:
          type: array
          items: { type: string, example: monitor.down }
        description: { type: string }

    WebhookEndpoint:
      type: object
      properties:
        id: { type: string, example: we_xyz }
        url: { type: string, format: uri }
        events:
          type: array
          items: { type: string }
        active: { type: boolean }
        created_at: { type: string, format: date-time }

    CreateWebhookEndpointResponse:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              type: object
              properties:
                endpoint: { $ref: '#/components/schemas/WebhookEndpoint' }
                secret:
                  type: string
                  description: 签名 secret;**仅返回一次**;用户端用此 secret 校验出站 webhook 签名。

    WebhookEndpointListResponse:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/WebhookEndpoint' }

    WebhookEventPayload:
      type: object
      required: [id, type, created_at, data]
      properties:
        id: { type: string, example: evt_xyz }
        type:
          type: string
          example: monitor.down
          description: |
            事件类型(完整列表详 16-api-spec.md §6):
            monitor.down / monitor.up / monitor.degraded / monitor.created / monitor.updated /
            monitor.deleted / monitor.paused /
            alert.triggered / alert.acknowledged / alert.resolved /
            incident.created / incident.updated / incident.resolved /
            maintenance.scheduled / maintenance.started / maintenance.ended /
            probe.completed / probe.failed /
            ssl.expiring / domain.expiring / icp.changed /
            subscription.created / subscription.updated / subscription.canceled /
            subscription.renewed / subscription.payment_failed /
            invoice.issued /
            api_key.created / api_key.revoked / api_key.leaked_detected /
            team.member_added / team.member_removed /
            report.ready / usage.threshold_reached /
            verdict.order_paid / verdict.report_ready / verdict.report_failed /
            verdict.refund_initiated / verdict.refund_failed /
            mcp.token_revoked / mcp.usage_threshold_reached
        created_at: { type: string, format: date-time }
        data: { type: object, additionalProperties: true }
        metadata:
          type: object
          properties:
            api_version: { type: string, example: v1 }
            delivery_id: { type: string }
            attempt: { type: integer }

    # ---------- Billing ----------
    SubscriptionResponse:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              type: object
              properties:
                tier: { type: string, enum: [free, pro, team, business, agent_pro] }
                status: { type: string, enum: [active, past_due, canceled, expired] }
                period_end: { type: string, format: date-time }
                cancel_at_period_end: { type: boolean }

    UsageResponse:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              type: object
              description: |
                D2 锁定:`api_calls` 与 `mcp_units` 是两条独立量表,不混合。
              properties:
                period: { type: string, example: "2026-05" }
                api_calls:
                  type: object
                  properties:
                    used: { type: integer }
                    quota: { type: integer }
                    remaining: { type: integer }
                mcp_units:
                  type: object
                  properties:
                    used: { type: integer }
                    quota: { type: integer }
                    remaining: { type: integer }
                monitors_count: { type: integer }
                monitor_checks_count: { type: integer }

    Plan:
      type: object
      properties:
        code: { type: string, example: pro }
        name: { type: string, example: Pro }
        tier_group: { type: string, enum: [core, compliance, agent_pro] }
        price_cny_monthly: { type: number, nullable: true }
        price_cny_yearly: { type: number, nullable: true }
        features:
          type: array
          items: { type: string }
        limits:
          type: object
          additionalProperties: true

    PlanListResponse:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/Plan' }

    # =====================================================================
    # VERDICT MODULE SCHEMAS (Evidence-as-a-Service)
    # =====================================================================
    VerdictTemplate:
      type: string
      enum: [sla, incident, compliance, legal]
      description: |
        Verdict 场景模板(K5 锁定):
        - `sla` ¥299 — SLA 索赔证据(企业用户 vs CDN/云厂商)
        - `incident` ¥199 — 故障取证
        - `compliance` ¥499 — 合规自证(等保/审计)
        - `legal` ¥999 — 争议取证(法务高保真)

    VerdictQuoteRequest:
      type: object
      required: [template, target, time_window_start, time_window_end]
      properties:
        template: { $ref: '#/components/schemas/VerdictTemplate' }
        target:
          type: string
          example: example.com
          description: domain / url / ip
        time_window_start: { type: string, format: date-time }
        time_window_end: { type: string, format: date-time }
        regions:
          type: array
          items: { type: string }
          description: 限定参与节点的地理范围(可选)

    VerdictQuoteResponse:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              type: object
              required: [eligible, price_cny]
              properties:
                eligible:
                  type: boolean
                  description: 是否可生成(若 false,见 reason)
                reason:
                  type: string
                  enum:
                    - ok
                    - data_insufficient
                    - target_in_denylist
                    - nodes_lt_3
                    - target_high_risk
                    - target_unresolvable
                  description: 不可生成原因(eligible=true 时为 ok)
                price_cny: { type: number, example: 299 }
                template: { $ref: '#/components/schemas/VerdictTemplate' }
                available_nodes_count:
                  type: integer
                  description: 时间窗内有数据的节点数;< 3 时 eligible=false
                data_coverage_pct:
                  type: number
                  description: 时间窗内数据覆盖率(0-100);< 50% 时 eligible=false
                legal_disclaimer:
                  type: string
                  description: 法律边界声明文案(产品 UI 必须展示)
                  example: 本报告为 idcd.com 提供的一手观测数据,不构成司法鉴定结论。

    CreateVerdictOrderRequest:
      type: object
      required: [template, target, time_window_start, time_window_end]
      properties:
        template: { $ref: '#/components/schemas/VerdictTemplate' }
        target: { type: string }
        time_window_start: { type: string, format: date-time }
        time_window_end: { type: string, format: date-time }
        notify_email:
          type: string
          format: email
          description: 报告生成完成通知邮箱(默认账户邮箱)
        webhook_url:
          type: string
          format: uri
          description: 报告生成完成时回调(可选;与邮件并行)
        notes: { type: string }
        idempotency_key:
          type: string
          description: 客户端去重 key(也可通过 Idempotency-Key header 传)

    CreateVerdictOrderResponse:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              type: object
              properties:
                order: { $ref: '#/components/schemas/VerdictOrder' }
                checkout_url:
                  type: string
                  format: uri
                  description: |
                    跳转聚合支付 checkout 完成支付;支付成功 聚合支付 webhook 触发 generation。
                    URL 有效期 24 小时;过期需重新创建订单。
                  example: https://pay.example.com/checkout/xyz

    VerdictOrder:
      type: object
      properties:
        id: { type: string, example: v_abc123, description: 订单 ID(v_ 前缀) }
        owner_id: { type: string }
        template: { $ref: '#/components/schemas/VerdictTemplate' }
        target: { type: string }
        time_window_start: { type: string, format: date-time }
        time_window_end: { type: string, format: date-time }
        status:
          type: string
          enum: [pending, paid, generating, delivered, failed, refunded, refund_failed]
          description: |
            订单状态机(D4 + D5):
            - `pending` 待支付(刚创建)
            - `paid` 已支付(聚合支付 webhook 确认)
            - `generating` 报告生成中(WAL 走 attestation_record)
            - `delivered` 报告已交付(self_verify 通过)
            - `failed` 生成失败(任一 step DLQ 或 self_verify 失败)
            - `refunded` 已退款(D5 自动 retry 成功 或 人工手动)
            - **`refund_failed`** — D5 兜底失败状态:聚合支付 refund 30min retry 全失败,
              进入 admin dashboard 等待人工处理;P0 告警创始人(7×24)。
        price_cny: { type: number, example: 299 }
        price_paid_cny: { type: number, description: 实收(支付通道扣费后) }
        ext_order_id: { type: string }
        refund_reason: { type: string, nullable: true }
        refund_attempt_count:
          type: integer
          description: D5 refund retry queue 累计次数(0-3+)
        refund_apology_sent_at:
          type: string
          format: date-time
          nullable: true
          description: D5 道歉邮箱发送时间(无论 refund 是否成功,30min 内必发)
        created_at: { type: string, format: date-time }
        paid_at: { type: string, format: date-time, nullable: true }
        delivered_at: { type: string, format: date-time, nullable: true }
        failed_at: { type: string, format: date-time, nullable: true }
        refunded_at: { type: string, format: date-time, nullable: true }

    VerdictReport:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              type: object
              properties:
                id: { type: string, example: vr_xyz }
                order_id: { type: string, example: v_abc123 }
                pdf_url:
                  type: string
                  format: uri
                  description: S3 预签名 URL(1h 有效);可重新获取
                pdf_size_bytes: { type: integer }
                content_hash:
                  type: string
                  description: SHA-256 of PDF bytes
                  example: "sha256:abc123..."
                signature_key_id: { type: string }
                signature_key_version: { type: integer }
                tsa_provider:
                  type: string
                  enum: [digicert, globalsign, ntsc]
                tsa_time: { type: string, format: date-time }
                blockchain_anchor:
                  type: object
                  nullable: true
                  description: 可选区块链锚定(K8;S3 评估)
                  properties:
                    chain: { type: string, enum: [polygon, ethereum, arweave] }
                    tx_hash: { type: string }
                nodes_used:
                  type: array
                  items: { type: string }
                  description: 报告引用的节点 ID 列表
                node_consistency_pct:
                  type: number
                  minimum: 0
                  maximum: 100
                  description: 多节点一致性百分比
                llm_used: { type: boolean }
                llm_model: { type: string, nullable: true }
                llm_prompt_version: { type: string, nullable: true }
                self_verify_status:
                  type: string
                  enum: [pass, fail, pending]
                  description: |
                    D6 Self-Verify Worker(独立进程 / VPC / KMS 客户端)的自检结果。
                    `fail` → 触发 D5 退款 + 道歉邮箱;`pass` → status=delivered。
                self_verify_at: { type: string, format: date-time, nullable: true }
                confidence_label:
                  type: string
                  enum: [high, medium, low]
                report_type:
                  type: string
                  enum: [observation_only]
                  default: observation_only
                  description: |
                    D-Concern1 锁定:默认 `observation_only`,明确告知"一手观测数据 + 第三方背书,
                    不构成司法鉴定结论"。保留枚举供 S4 司法鉴定所合作通道升级。
                archived_url:
                  type: string
                  format: uri
                  description: S3 WORM 永久归档(只读;6 年合规留存)
                created_at: { type: string, format: date-time }

    CreateShareTokenRequest:
      type: object
      properties:
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: 过期时间(null = 永不过期)
        password:
          type: string
          nullable: true
          description: 访问密码(可选)
        max_views:
          type: integer
          nullable: true
          description: 最大查看次数

    ShareTokenResponse:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              type: object
              properties:
                share_url:
                  type: string
                  format: uri
                  example: https://attest.idcd.com/r/share_xyz
                token: { type: string, example: share_xyz }
                expires_at: { type: string, format: date-time, nullable: true }

    # =====================================================================
    # ATTESTATION SCHEMAS (公开验签)
    # =====================================================================
    AttestVerifyResponse:
      type: object
      description: D-Concern1 锁定响应字段;不走 Envelope(此接口公开 + 不限频 + 缓存友好)。
      required: [valid, report_type, legal_disclaimer]
      properties:
        valid:
          type: boolean
          description: 验签结果
          example: true
        signature_chain:
          type: string
          description: 签名证书链 PEM
        public_key_fingerprint:
          type: string
          description: 公钥 SHA-256 指纹
          example: "sha256:abcdef..."
        signed_at:
          type: string
          format: date-time
          description: 签名时间(由签名内嵌字段提取)
          example: "2026-05-13T01:00:00Z"
        tsa_provider:
          type: string
          enum: [digicert, globalsign, ntsc]
          description: 时间戳颁发者
        tsa_time:
          type: string
          format: date-time
          description: RFC3161 时间戳时间
        content_hash:
          type: string
          description: SHA-256 of PDF bytes
          example: "sha256:..."
        signature_key_id:
          type: string
          description: 签名所用 key id
        signature_key_version:
          type: integer
          description: 签名所用 key version(可能已撤销/过期;public key 仍可拉取用于历史验签,详 18 §7.1)
        report_type:
          type: string
          enum: [observation_only]
          default: observation_only
          description: |
            D-Concern1 必含字段。默认 `observation_only`,明确告知第三方:
            "本报告是一手观测数据,不是司法鉴定结论"。
        legal_disclaimer:
          type: string
          description: 法律边界声明(中英双语,UI 必须展示)
          example: 本报告为 idcd.com 提供的一手观测数据,不构成司法鉴定结论。This report is observation data from idcd.com and does not constitute a forensic conclusion.
        invalid_reason:
          type: string
          nullable: true
          enum: [null, signature_mismatch, tsa_invalid, content_modified, key_unknown, malformed_pdf]
          description: valid=false 时填充

    AttestKeyResponse:
      type: object
      properties:
        key_id: { type: string }
        key_version: { type: integer }
        public_key_pem: { type: string }
        public_key_fingerprint: { type: string }
        algorithm: { type: string, example: ECDSA_P256_SHA256 }
        status:
          type: string
          enum: [active, rotated, revoked]
          description: revoked / rotated key 仍可查询 public key(只读)
        created_at: { type: string, format: date-time }
        rotated_at: { type: string, format: date-time, nullable: true }
        revoked_at: { type: string, format: date-time, nullable: true }
        ceremony_log_id:
          type: string
          description: 关联的 key_ceremony_log 记录

    KeyCeremonyLog:
      type: object
      properties:
        id: { type: string, example: kc_xyz }
        action:
          type: string
          enum: [root_gen, root_split, sign_key_rotate, emergency_revoke]
        key_id: { type: string, nullable: true }
        key_version: { type: integer, nullable: true }
        actors:
          type: array
          description: 参与方(双人/多人审批 + 公证)
          items:
            type: object
            properties:
              identity: { type: string, example: founder@idcd.com }
              role: { type: string, example: kms_admin }
        evidence_url:
          type: string
          format: uri
          description: 录像 / 公证 PDF 链接(transparency 公开)
        notes: { type: string }
        created_at: { type: string, format: date-time }

    KeyCeremonyListResponse:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/KeyCeremonyLog' }
        meta: { $ref: '#/components/schemas/Meta' }

    AttestationRecord:
      type: object
      description: D4 WAL 行;每 step 完成写一条。
      properties:
        id: { type: string, example: att_xyz }
        report_id: { type: string }
        action:
          type: string
          enum: [signed, tsa_stamped, anchored, s3_archived, self_verified, revoked]
        status:
          type: string
          enum: [pending, success, failure]
        external_id:
          type: string
          description: TSA serial / chain tx hash / KMS req id / S3 ETag
        idempotency_key:
          type: string
          description: 提供给外部 API(AWS KMS / TSA)的 idempotency token
        result: { type: string, enum: [success, failure] }
        error_detail: { type: string, nullable: true }
        retry_count: { type: integer, description: D4 step 重试次数(0-3) }
        created_at: { type: string, format: date-time }
        completed_at: { type: string, format: date-time, nullable: true }

    TsaResponse:
      type: object
      description: 单次 TSA 调用记录;用于 transparency 审计。
      properties:
        id: { type: string, example: tsa_xyz }
        provider:
          type: string
          enum: [digicert, globalsign, ntsc]
        request_hash: { type: string }
        serial_number: { type: string }
        issued_at: { type: string, format: date-time }
        valid_until: { type: string, format: date-time }
        status:
          type: string
          enum: [success, failure, timeout]
        latency_ms: { type: integer }
        used_by_report_id: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    # =====================================================================
    # DISPUTE SCHEMAS
    # =====================================================================
    CreateDisputeRequest:
      type: object
      required: [contact_email, claim, evidence_description]
      properties:
        contact_email: { type: string, format: email }
        contact_phone: { type: string, nullable: true }
        organization:
          type: string
          description: 申诉方组织名(如 example.com 的所有公司)
        claim:
          type: string
          description: 核心诉求(如"该报告对我方网站不可用的认定不实")
          maxLength: 2000
        evidence_description:
          type: string
          description: 反证描述
          maxLength: 5000
        evidence_urls:
          type: array
          items: { type: string, format: uri }
        identity_proof_url:
          type: string
          format: uri
          description: 申诉方身份/所有权证明(域名 TXT 验证 / 营业执照 / 等)

    DisputeResponse:
      type: object
      properties:
        id: { type: string, example: dsp_xyz }
        report_id: { type: string }
        status:
          type: string
          enum: [pending, reviewing, accepted, rejected, withdrawn]
          description: |
            处理状态机:
            - `pending` 已提交,待平台 24h 内响应
            - `reviewing` 平台审核中
            - `accepted` 申诉成立 → 报告下架 + 退款 + transparency 记录
            - `rejected` 申诉不成立(返回 review_reason)
            - `withdrawn` 申诉方撤回
        review_reason: { type: string, nullable: true }
        decided_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    # =====================================================================
    # COMPLIANCE SCHEMAS
    # =====================================================================
    CreateComplianceSubscriptionRequest:
      type: object
      required: [tier]
      properties:
        tier:
          type: string
          enum: [starter, pro, enterprise]
          description: |
            K5b 锁定档位:
            - `starter` ¥3k/年 — 50 监控 + 月度报告 + 12 月历史
            - `pro` ¥12k/年 — 200 监控 + 周度报告 + 24 月历史 + 5 份免费 Verdict
            - `enterprise` ¥30k/年(议价)— 1000 监控 + 任意频率 + 6 年历史 + 不限 Verdict
        contact_company:
          type: string
          description: 企业用户合规对接所需
        contact_email: { type: string, format: email }
        billing_address:
          type: object
          additionalProperties: true

    ComplianceSubscription:
      type: object
      properties:
        id: { type: string, example: cs_xyz }
        owner_id: { type: string }
        tier:
          type: string
          enum: [starter, pro, enterprise]
        status:
          type: string
          enum: [active, past_due, canceled, expired]
        period_start: { type: string, format: date-time }
        period_end: { type: string, format: date-time }
        monitors_quota: { type: integer }
        reports_frequency:
          type: string
          enum: [monthly, weekly, custom]
        history_retention_months: { type: integer }
        free_verdict_count: { type: integer }
        free_verdict_used: { type: integer }
        price_cny: { type: number }
        ext_subscription_id: { type: string }
        created_at: { type: string, format: date-time }
        canceled_at: { type: string, format: date-time, nullable: true }

    ComplianceSubscriptionResponse:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              type: object
              properties:
                subscription: { $ref: '#/components/schemas/ComplianceSubscription' }
                checkout_url:
                  type: string
                  format: uri
                  description: 跳聚合支付 checkout 完成支付

    ComplianceReport:
      type: object
      description: Compliance 年订自动生成的周/月度报告
      properties:
        id: { type: string, example: cr_xyz }
        subscription_id: { type: string }
        period_year: { type: integer }
        period_month: { type: integer, nullable: true }
        period_week: { type: integer, nullable: true }
        pdf_url: { type: string, format: uri }
        signature: { type: string }
        tsa_provider: { type: string, enum: [digicert, globalsign, ntsc] }
        tsa_time: { type: string, format: date-time }
        monitors_included: { type: integer }
        report_type: { type: string, enum: [observation_only], default: observation_only }
        created_at: { type: string, format: date-time }

    ComplianceReportListResponse:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/ComplianceReport' }

    # =====================================================================
    # MCP TOKEN / SESSION / TOOL CALL SCHEMAS
    # =====================================================================
    CreateMcpTokenRequest:
      type: object
      required: [type, name]
      properties:
        type:
          type: string
          enum: [personal, workspace, service]
          description: |
            D2 锁定三种形态。区别详 03 §5a.1。
        name:
          type: string
          example: Cursor on MacBook
        scope:
          type: object
          description: 限定 tools / regions(默认全开)
          properties:
            tools:
              type: array
              items: { type: string }
              example: [idcd_ping, idcd_http_probe, idcd_diagnose]
            regions:
              type: array
              items: { type: string }
              example: [CN, US, EU]
        ip_whitelist:
          type: array
          items: { type: string, format: cidr }
          description: |
            CIDR 列表(如 `["1.2.3.4/32", "5.6.7.0/24"]`)。
            **service 必填**;personal / workspace 可选。
            无白名单的 service 创建请求返回 422 `validation_error`。
          example: ["1.2.3.4/32"]
        expires_at:
          type: string
          format: date-time
          description: |
            **必填,最长 90 天**(D2):
            - personal 默认 24h(也是最长)
            - workspace 最长 90d
            - service 最长 90d
            超过最长值返回 422。
        auto_renew:
          type: boolean
          default: true
          description: |
            D2:workspace / service 默认 true(过期前 24h auto_renewal,基于 last_used_at;
            超 30 天未用不续 → 等于自动撤销);personal 走 OAuth-like refresh,此字段忽略。

    McpToken:
      type: object
      properties:
        id: { type: string, example: mcpt_xyz }
        owner_id: { type: string }
        type: { type: string, enum: [personal, workspace, service] }
        name: { type: string }
        token_display:
          type: string
          example: "mcpt_***1234"
          description: 后 4 位 + 前缀;完整 token 仅创建时返回一次
        scope:
          type: object
          properties:
            tools:
              type: array
              items: { type: string }
            regions:
              type: array
              items: { type: string }
        ip_whitelist:
          type: array
          items: { type: string }
        revoked: { type: boolean }
        revoke_reason: { type: string, nullable: true }
        expires_at: { type: string, format: date-time }
        auto_renew: { type: boolean }
        last_renewed_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        last_used_at: { type: string, format: date-time, nullable: true }

    CreateMcpTokenResponse:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              type: object
              properties:
                token: { $ref: '#/components/schemas/McpToken' }
                secret:
                  type: string
                  description: |
                    完整 token 明文(`mcpt_xxx...`)**仅此一次返回**;
                    存到 Cursor / Claude Code / Codex 配置文件,后续不可再查。
                  example: mcpt_aBcDeFg...

    McpTokenListResponse:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/McpToken' }

    McpSession:
      type: object
      description: |
        MCP 会话(MCP client 连接 mcp.idcd.com 时建立)。SSE 连接 stateful(D13),
        LB sticky session 必要。
      properties:
        id: { type: string, example: mcps_xyz }
        token_id: { type: string }
        owner_id: { type: string }
        client_id:
          type: string
          enum: [Cursor, ClaudeCode, Codex, sdk-py, sdk-ts, other]
        client_version: { type: string }
        client_ip: { type: string, format: ipv4 }
        started_at: { type: string, format: date-time }
        last_activity_at: { type: string, format: date-time }
        ended_at: { type: string, format: date-time, nullable: true }
        total_tool_calls: { type: integer }
        total_units: { type: integer }

    McpToolCall:
      type: object
      description: |
        单次 MCP tool 调用(高频写入;TimescaleDB Hypertable)。
        默认 payload 哈希存储(隐私);D7 用户可在 /app/mcp/settings 开启
        "失败 case 临时存 7 天原 payload",仅 status=failure 写入 `*_raw` jsonb,
        过期 cron 自动清理。
      properties:
        id: { type: string, example: mctc_xyz }
        session_id: { type: string }
        owner_id: { type: string }
        tool_name:
          type: string
          enum:
            - idcd_ping
            - idcd_http_probe
            - idcd_dns_resolve
            - idcd_traceroute
            - idcd_ssl_cert
            - idcd_diagnose
            - idcd_ip_info
            - idcd_whois
            - idcd_icp
            - idcd_create_monitor
            - idcd_check_monitor
            - idcd_generate_verdict
            - idcd_list_nodes
        request_payload_hash: { type: string }
        response_payload_hash: { type: string }
        request_payload_raw:
          type: object
          nullable: true
          additionalProperties: true
          description: D7 失败 case + 用户授权下临时存(7 天自动清理)
        response_payload_raw:
          type: object
          nullable: true
          additionalProperties: true
        payload_retain_until: { type: string, format: date-time, nullable: true }
        units_charged: { type: integer }
        status:
          type: string
          enum: [success, failure, timeout, rate_limited]
        latency_ms: { type: integer }
        error_class: { type: string, nullable: true }
        error_detail: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    McpUsageResponse:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              type: object
              properties:
                period: { type: string, example: "2026-05" }
                total_units_used: { type: integer, example: 4250 }
                total_units_quota: { type: integer, example: 5000 }
                total_cost_cny: { type: number, example: 8.5 }
                by_tool:
                  type: array
                  description: 按 tool 拆分
                  items:
                    type: object
                    properties:
                      tool_name: { type: string }
                      calls: { type: integer }
                      units: { type: integer }
                      cost_cny: { type: number }
                      avg_latency_ms: { type: number }
                by_client:
                  type: array
                  description: 按 client 拆分
                  items:
                    type: object
                    properties:
                      client_id: { type: string }
                      calls: { type: integer }
                      units: { type: integer }
                time_series:
                  type: array
                  description: 按时间序列(daily / hourly,取决于 group_by)
                  items:
                    type: object
                    properties:
                      bucket: { type: string, format: date-time }
                      units: { type: integer }
                      calls: { type: integer }

    # =====================================================================
    # AGENT OBSERVABILITY SCHEMAS
    # =====================================================================
    CreateAgentObsMonitorRequest:
      type: object
      required: [agent_name, type, endpoint_url, frequency_seconds, failure_threshold]
      properties:
        agent_name:
          type: string
          description: 用户给 Agent 起的名(如 `customer_support_v3`)
        step_name:
          type: string
          description: Agent 工作流 step 名(可选,如 `retrieval`)
        type:
          type: string
          enum: [llm, tool, rag, other]
          description: |
            - `llm` = M21 LLM Endpoint Health(OpenAI/Anthropic/Bedrock/自家)— **强制 `budget_per_check_usd`**
            - `tool` = M22 Tool/API Endpoint
            - `rag` = M23 RAG/Vector Store
            - `other` = 其他类型(S4 扩展)
        endpoint_url: { type: string, format: uri }
        endpoint_config:
          type: object
          description: 不同 type 不同字段(详 04 §3.15-3.17);如 LLM 类型含 prompt / model
          additionalProperties: true
        frequency_seconds:
          type: integer
          minimum: 10
          example: 300
        budget_per_check_usd:
          type: number
          description: |
            M21 必填(防爆账单);单次 check 预估 USD 成本。
            原子 UPDATE budget(D7);超额 → status=`exceeded_budget`。
        failure_threshold:
          type: object
          additionalProperties: true
          description: 失败阈值定义(latency / status_codes / payload_assertions)
        notification_channels:
          type: array
          items: { type: string }
          description: 关联 channel ID 列表

    AgentObsMonitor:
      allOf:
        - $ref: '#/components/schemas/CreateAgentObsMonitorRequest'
        - type: object
          properties:
            id: { type: string, example: aom_xyz }
            owner_id: { type: string }
            status:
              type: string
              enum: [active, paused, exceeded_budget]
              description: |
                状态机:
                - `active` 正常运行
                - `paused` 用户手动暂停
                - `exceeded_budget` D7 budget 触发自动暂停(发邮件通知);需用户手动调整 budget 后 resume
            total_cost_this_month_usd:
              type: number
              description: D7 原子 UPDATE 累加;同 transaction 内做 budget 检查
            created_at: { type: string, format: date-time }
            paused_at: { type: string, format: date-time, nullable: true }

    AgentObsMonitorListResponse:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/AgentObsMonitor' }

    AgentObsEvent:
      type: object
      properties:
        id: { type: string, example: aoe_xyz }
        monitor_id: { type: string }
        owner_id: { type: string }
        region:
          type: string
          description: 哪个节点验证
        occurred_at: { type: string, format: date-time }
        latency_ms: { type: integer, nullable: true }
        success: { type: boolean }
        failure_class:
          type: string
          enum: [timeout, "4xx", "5xx", malformed, semantic, budget]
          nullable: true
        failure_detail:
          type: object
          additionalProperties: true
          nullable: true
        cost_usd:
          type: number
          nullable: true
          description: M21 实际花费
        trace_id:
          type: string
          nullable: true
          description: 可选 Agent 端 trace 关联

    AgentObsEventStreamFrame:
      type: object
      description: |
        SSE 流单帧;实际响应是 `text/event-stream`,格式:
        ```
        event: agent_obs.event
        id: <event_id>
        data: <json AgentObsEvent>
        ```
        客户端断线后用 `Last-Event-ID` header 续传。
      properties:
        event: { type: string, example: agent_obs.event }
        id: { type: string }
        data: { $ref: '#/components/schemas/AgentObsEvent' }

    # =====================================================================
    # LEADERBOARD SCHEMAS
    # =====================================================================
    CreateLeaderboardOptoutRequest:
      type: object
      required: [vendor_name, applicant_email, identity_proof_url]
      properties:
        vendor_name:
          type: string
          example: ExampleCDN Inc
        applicant_email: { type: string, format: email }
        applicant_organization: { type: string }
        reason:
          type: string
          maxLength: 5000
          description: 退出原因
        contact_phone: { type: string }
        identity_proof_url:
          type: string
          format: uri
          description: 主体认证材料(营业执照 / 公章 文件)

    LeaderboardOptoutRequest:
      allOf:
        - $ref: '#/components/schemas/CreateLeaderboardOptoutRequest'
        - type: object
          properties:
            id: { type: string }
            status:
              type: string
              enum: [pending, approved, rejected]
            decision_reason: { type: string, nullable: true }
            created_at: { type: string, format: date-time }
            decided_at: { type: string, format: date-time, nullable: true }

    LeaderboardReport:
      type: object
      description: |
        CDN/云厂商月度排行榜报告(K6 边界控制)。
        勘误公告通过 `errata_pdf_url`(D-Concern3);不直接删除原报告。
      properties:
        id: { type: string, example: lb_2026_05 }
        period_year: { type: integer }
        period_month: { type: integer }
        methodology_version: { type: string }
        excluded_vendors:
          type: array
          items: { type: string }
          description: 已申请退出的厂商
        pdf_url: { type: string, format: uri }
        verdict_report_id:
          type: string
          nullable: true
          description: 配套 Verdict 报告(自我背书)
        status:
          type: string
          enum: [draft, reviewing, published, archived]
        errata_pdf_url:
          type: string
          format: uri
          nullable: true
          description: D-Concern3 勘误公告 PDF(已发布后修订用此 URL,不删除原报告)
        errata_reason:
          type: string
          nullable: true
          description: 勘误原因(厂商申诉 / 内部修订 等)
        published_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    # ---- Free Cert Module schemas (S2 W8, 详 20-free-cert.md) ----
    CertOrderResponse:
      type: object
      properties:
        id: { type: integer, format: int64 }
        account_id: { type: integer, format: int64 }
