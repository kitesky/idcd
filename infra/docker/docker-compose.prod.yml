# idcd 生产环境 Docker Compose
# 部署路径: /opt/idcd/docker-compose.yml
# 数据库 / Redis 使用云托管服务，不在本文件中定义
#
# 启动:   docker compose up -d
# 查日志: docker compose logs -f api
# 依赖:
#   - /opt/idcd/config/prod.env.yaml  (包含所有密钥，不入 git)
#   - .env 文件包含 GHCR_OWNER 变量
#
# 配置加载约定:
#   各 Go service 的 main.go 通过 lib/shared/config.DefaultPath() 读 IDCD_CONFIG env var
#   (没有 flag.Parse 解析 -config，所以 command 里不再传 -config xxx，统一用 env)

services:
  api:
    image: ghcr.io/${GHCR_OWNER}/idcd-api:latest
    container_name: idcd-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - /opt/idcd/config/prod.env.yaml:/config/prod.env.yaml:ro
    environment:
      - TZ=Asia/Shanghai
      - IDCD_CONFIG=/config/prod.env.yaml
    # healthcheck 由 Dockerfile HEALTHCHECK 提供;此处保留 compose 级覆盖
    # 以确保 depends_on: condition: service_healthy 行为稳定
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: "json-file"
      options: {max-size: "100m", max-file: "5"}

  aggregator:
    image: ghcr.io/${GHCR_OWNER}/idcd-aggregator:latest
    container_name: idcd-aggregator
    restart: unless-stopped
    volumes:
      - /opt/idcd/config/prod.env.yaml:/config/prod.env.yaml:ro
    environment:
      - TZ=Asia/Shanghai
      - IDCD_CONFIG=/config/prod.env.yaml
    depends_on:
      api:
        condition: service_healthy
    logging:
      driver: "json-file"
      options: {max-size: "50m", max-file: "3"}

  notifier:
    image: ghcr.io/${GHCR_OWNER}/idcd-notifier:latest
    container_name: idcd-notifier
    restart: unless-stopped
    volumes:
      - /opt/idcd/config/prod.env.yaml:/config/prod.env.yaml:ro
    environment:
      - TZ=Asia/Shanghai
      - IDCD_CONFIG=/config/prod.env.yaml
    logging:
      driver: "json-file"
      options: {max-size: "50m", max-file: "3"}

  gateway:
    image: ghcr.io/${GHCR_OWNER}/idcd-gateway:latest
    container_name: idcd-gateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:8443:8443"
    volumes:
      - /opt/idcd/config/prod.env.yaml:/config/prod.env.yaml:ro
      - /opt/idcd/certs:/certs:ro
    environment:
      - TZ=Asia/Shanghai
      - IDCD_CONFIG=/config/prod.env.yaml
    logging:
      driver: "json-file"
      options: {max-size: "50m", max-file: "3"}

  scheduler:
    image: ghcr.io/${GHCR_OWNER}/idcd-scheduler:latest
    container_name: idcd-scheduler
    restart: unless-stopped
    volumes:
      - /opt/idcd/config/prod.env.yaml:/config/prod.env.yaml:ro
    environment:
      - TZ=Asia/Shanghai
      - IDCD_CONFIG=/config/prod.env.yaml
    depends_on:
      api:
        condition: service_healthy
    logging:
      driver: "json-file"
      options: {max-size: "50m", max-file: "3"}

  # S2 cert platform — HTTP API, ACME worker, renewal cron.
  # Three replicas of one image; CMD selects the binary. Each reads its
  # own CERT_* env vars (config loader in apps/cert-svc/internal/config).
  cert-svc:
    image: ghcr.io/${GHCR_OWNER}/idcd-cert-svc:latest
    container_name: idcd-cert-svc
    restart: unless-stopped
    ports:
      - "127.0.0.1:8086:8080"
      - "127.0.0.1:9096:9090"  # /metrics (VPN-bound scraper)
    environment:
      - TZ=Asia/Shanghai
    env_file:
      - /opt/idcd/config/cert-svc.env
    command: ["/bin/cert-svc"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: "json-file"
      options: {max-size: "50m", max-file: "3"}

  cert-worker:
    image: ghcr.io/${GHCR_OWNER}/idcd-cert-svc:latest
    container_name: idcd-cert-worker
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    env_file:
      - /opt/idcd/config/cert-svc.env
    command: ["/bin/cert-worker"]
    depends_on:
      cert-svc:
        condition: service_healthy
    logging:
      driver: "json-file"
      options: {max-size: "50m", max-file: "3"}

  cert-renewer:
    image: ghcr.io/${GHCR_OWNER}/idcd-cert-svc:latest
    container_name: idcd-cert-renewer
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    env_file:
      - /opt/idcd/config/cert-svc.env
    command: ["/bin/cert-renewer"]
    depends_on:
      cert-svc:
        condition: service_healthy
    logging:
      driver: "json-file"
      options: {max-size: "50m", max-file: "3"}

  nginx:
    image: nginx:alpine
    container_name: idcd-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/idcd/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/idcd/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      api:
        condition: service_healthy
    logging:
      driver: "json-file"
      options: {max-size: "50m", max-file: "5"}
