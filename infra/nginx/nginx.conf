user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # 隐藏版本号
    server_tokens off;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ─── Upstreams（docker-compose service name；不要用 127.0.0.1）─────────────
    # nginx 在容器里跑，127.0.0.1 = nginx 自己；service name 由 compose default
    # network 的内置 DNS 解析到对应 container IP。
    upstream idcd_api {
        server api:8080 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    # 通用反代头（多 server block 复用）
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header Connection        "";

    # ─── default_server：拒绝未识别 Host ──────────────────────────────────────
    # 兜底，防 host header spoofing 触达后端。
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }

    server {
        listen 443 ssl default_server;
        server_name _;

        # 使用最近的有效证书占位（生产应配通配 *.idcd.com 或独立证书）
        ssl_certificate     /etc/nginx/ssl/api.idcd.com.crt;
        ssl_certificate_key /etc/nginx/ssl/api.idcd.com.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        return 444;
    }

    # ─── API: api.idcd.com ────────────────────────────────────────────────────
    server {
        listen 80;
        server_name api.idcd.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name api.idcd.com;
        http2 on;

        ssl_certificate     /etc/nginx/ssl/api.idcd.com.crt;
        ssl_certificate_key /etc/nginx/ssl/api.idcd.com.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # ACME http-01 challenge（自定义域名拿证书时由 acme manager 写入）
        location /.well-known/acme-challenge/ {
            root /var/www/acme;
        }

        location / {
            proxy_pass http://idcd_api;

            # SSE / 长连接支持（监控实时流、诊断 stream）
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }

    # ─── Admin API: admin.idcd.com ────────────────────────────────────────────
    # admin 前端走 Cloudflare Workers（idcd.com/admin/*），但 admin 后端调用
    # /internal/admin/* 仍指向 api 服务；此 server block 给运维 / VPN
    # 内网直连用（curl / postman）。
    server {
        listen 80;
        server_name admin.idcd.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name admin.idcd.com;
        http2 on;

        ssl_certificate     /etc/nginx/ssl/api.idcd.com.crt;
        ssl_certificate_key /etc/nginx/ssl/api.idcd.com.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # 只允许 VPN / 办公网段。默认 deny — ops 部署前必须在
        # /etc/nginx/conf.d/admin-allowlist.conf 里追加 allow 段。
        # 该 include 文件不在 repo 内，故 nginx -t 时若不存在 fail-closed。
        include /etc/nginx/conf.d/admin-allowlist.conf;
        deny all;

        location / {
            proxy_pass http://idcd_api;
            proxy_buffering    off;
            proxy_read_timeout 600s;
        }
    }

    # ─── status-page custom domain 兜底 ───────────────────────────────────────
    # 真正的状态页前端跑在 Cloudflare Workers，自定义域名（用户的 CNAME）通常
    # 解析到我们提供的一个 stable host（如 cname.idcd.com）。如果用户 CNAME 直接
    # 指到此 nginx server IP（备用回源 / Cloudflare 出问题时的 fallback），下面的
    # server block 把请求转给 api 的 ACME challenge endpoint + 重定向到主前端：
    server {
        listen 80;
        server_name cname.idcd.com;

        # ACME http-01: 让 api.acme.manager 完成自定义域名签发
        location /.well-known/acme-challenge/ {
            proxy_pass http://idcd_api;
        }

        # 其它路径：301 到 Cloudflare 主前端（保持原 host，让前端 proxy.ts 识别）
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name cname.idcd.com;
        http2 on;

        # ACME 会动态写入证书；上线前先用 self-signed 占位
        ssl_certificate     /etc/nginx/ssl/api.idcd.com.crt;
        ssl_certificate_key /etc/nginx/ssl/api.idcd.com.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location /.well-known/acme-challenge/ {
            proxy_pass http://idcd_api;
        }

        # 自定义域名状态页：透传给 api，由 status_subscription handler 渲染
        # （未来 Cloudflare 出问题时的备用回源路径；正常流量走 CF Workers）
        location / {
            proxy_pass http://idcd_api;
            proxy_buffering    off;
            proxy_read_timeout 60s;
        }
    }
}

# ─── Agent Gateway（gateway.idcd.com）说明 ──────────────────────────────────
# Gateway 走 mTLS WebSocket（apps/gateway 自己监听 0.0.0.0:8443 with TLS+mTLS），
# **不能由 nginx 终结 TLS**，否则 client cert 验证链断裂。
# 部署方案：
#   - 方案 A (默认): gateway container 直接绑公网端口（如 docker-compose
#     "0.0.0.0:8443:8443"），DNS `gateway.idcd.com` A 记录指向服务器，
#     agent 通过 `wss://gateway.idcd.com:8443` 连接。nginx 完全不接 gateway 流量。
#   - 方案 B: 启用 nginx stream 模块按 SNI 透传 (`stream { ... }` 与 `http {}` 同级)
#     —— 需要把 443 让给 stream，再为 api/admin 让出 443 用其它端口，本配置不
#     采用这种方案。
# 当前 infra/docker/docker-compose.prod.yml 把 gateway 暴露在 127.0.0.1:8443，
# **上线前需修改为 0.0.0.0:8443（或宿主反向 PAT 到该端口）**，否则 agent 连不上。
