openapi: "3.1.0"
info:
  title: idcd API
  version: "1.0.0"
  description: "全球网络诊断 API — 拨测 / 网络信息 / 监控 / 告警 / 计费"
  contact:
    name: idcd API 支持
    url: https://idcd.com/support
    email: api@idcd.com
  termsOfService: https://idcd.com/legal/terms

servers:
  - url: https://api.idcd.com/v1
    description: 生产环境

security:
  - BearerAuth: []
  - ApiKeyHeader: []

paths:
  /probe/http:
    post:
      summary: HTTP 拨测
      description: 向目标 URL 发起 HTTP/HTTPS 拨测，返回状态码、响应时间、TLS 信息等
      operationId: probeHTTP
      security: []
      tags: [拨测]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProbeHTTPRequest'
            example:
              url: "https://github.com"
              method: "GET"
              timeout: 10
      responses:
        "200":
          description: 拨测成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProbeResponse'
        "400":
          $ref: '#/components/responses/BadRequest'
        "429":
          $ref: '#/components/responses/TooManyRequests'

  /probe/ping:
    post:
      summary: ICMP Ping
      description: 对目标主机发起 ICMP Ping 拨测，返回延迟和丢包率
      operationId: probePing
      security: []
      tags: [拨测]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProbePingRequest'
            example:
              host: "8.8.8.8"
              count: 4
              timeout: 5
      responses:
        "200":
          description: 拨测成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProbeResponse'
        "400":
          $ref: '#/components/responses/BadRequest'
        "429":
          $ref: '#/components/responses/TooManyRequests'

  /probe/dns:
    post:
      summary: DNS 解析拨测
      description: 对指定域名进行 DNS 解析，返回解析结果和耗时
      operationId: probeDNS
      security: []
      tags: [拨测]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProbeDNSRequest'
            example:
              domain: "github.com"
              record_type: "A"
              server: "8.8.8.8"
      responses:
        "200":
          description: 拨测成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProbeResponse'
        "400":
          $ref: '#/components/responses/BadRequest'

  /probe/tcp:
    post:
      summary: TCPing 拨测
      description: 对目标主机端口发起 TCP 连接测试，返回连接耗时
      operationId: probeTCP
      security: []
      tags: [拨测]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProbeTCPRequest'
            example:
              host: "github.com"
              port: 443
              timeout: 5
      responses:
        "200":
          description: 拨测成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProbeResponse'
        "400":
          $ref: '#/components/responses/BadRequest'

  /probe/traceroute:
    post:
      summary: Traceroute 路由追踪
      description: 追踪到目标主机的网络路径，返回每跳的 IP 和延迟
      operationId: probeTraceroute
      security: []
      tags: [拨测]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProbeTracerouteRequest'
            example:
              host: "github.com"
              max_hops: 30
              timeout: 30
      responses:
        "200":
          description: 拨测成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProbeResponse'
        "400":
          $ref: '#/components/responses/BadRequest'

  /info/ip:
    get:
      summary: IP 信息查询
      description: 查询 IP 地址的归属地、ASN、运营商等信息
      operationId: infoIP
      security: []
      tags: [网络信息]
      parameters:
        - name: ip
          in: query
          description: 要查询的 IP 地址，留空则查询请求方 IP
          schema:
            type: string
            example: "8.8.8.8"
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IPInfoResponse'
        "400":
          $ref: '#/components/responses/BadRequest'

  /info/whois:
    get:
      summary: WHOIS 查询
      description: 查询域名或 IP 的 WHOIS 注册信息
      operationId: infoWhois
      security: []
      tags: [网络信息]
      parameters:
        - name: q
          in: query
          required: true
          description: 查询目标（域名或 IP）
          schema:
            type: string
            example: "github.com"
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WhoisResponse'
        "400":
          $ref: '#/components/responses/BadRequest'

  /info/ssl:
    get:
      summary: SSL 证书查询
      description: 查询域名的 SSL/TLS 证书信息，包括颁发机构、有效期、SANs 等
      operationId: infoSSL
      security: []
      tags: [网络信息]
      parameters:
        - name: domain
          in: query
          required: true
          description: 要查询的域名
          schema:
            type: string
            example: "github.com"
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSLInfoResponse'
        "400":
          $ref: '#/components/responses/BadRequest'

  /info/dns:
    get:
      summary: DNS 记录查询
      description: 查询域名的各类 DNS 记录（A/AAAA/MX/TXT/NS/CNAME/SOA）
      operationId: infoDNS
      security: []
      tags: [网络信息]
      parameters:
        - name: domain
          in: query
          required: true
          description: 要查询的域名
          schema:
            type: string
            example: "github.com"
        - name: type
          in: query
          description: 记录类型，留空返回所有类型
          schema:
            type: string
            enum: [A, AAAA, MX, TXT, NS, CNAME, SOA]
            example: "A"
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DNSRecordsResponse'
        "400":
          $ref: '#/components/responses/BadRequest'

  /info/icp:
    get:
      summary: ICP 备案查询
      description: 查询域名的 ICP 备案信息（中国大陆）
      operationId: infoICP
      security: []
      tags: [网络信息]
      parameters:
        - name: domain
          in: query
          required: true
          description: 要查询的域名
          schema:
            type: string
            example: "baidu.com"
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ICPResponse'
        "400":
          $ref: '#/components/responses/BadRequest'

  /auth/register:
    post:
      summary: 用户注册
      description: 注册新用户账号，注册后发送验证邮件
      operationId: authRegister
      security: []
      tags: [账号]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              email: "user@example.com"
              password: "SecurePass123!"
      responses:
        "201":
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "400":
          $ref: '#/components/responses/BadRequest'
        "409":
          $ref: '#/components/responses/Conflict'
        "429":
          $ref: '#/components/responses/TooManyRequests'

  /auth/login:
    post:
      summary: 用户登录
      description: 使用邮箱和密码登录，返回 JWT access token
      operationId: authLogin
      security: []
      tags: [账号]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: "user@example.com"
              password: "SecurePass123!"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "429":
          $ref: '#/components/responses/TooManyRequests'

  /auth/logout:
    post:
      summary: 用户登出
      description: 吊销当前 session token
      operationId: authLogout
      tags: [账号]
      responses:
        "204":
          description: 登出成功
        "401":
          $ref: '#/components/responses/Unauthorized'

  /monitors:
    get:
      summary: 获取监控列表
      description: 获取当前用户的所有监控项
      operationId: listMonitors
      tags: [监控]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitorListResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: 创建监控
      description: 创建新的监控项
      operationId: createMonitor
      tags: [监控]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMonitorRequest'
            example:
              name: "GitHub 主页"
              type: "http"
              url: "https://github.com"
              interval: 60
      responses:
        "201":
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Monitor'
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "429":
          $ref: '#/components/responses/TooManyRequests'

  /monitors/{id}:
    get:
      summary: 获取监控详情
      description: 获取指定监控项的详细信息
      operationId: getMonitor
      tags: [监控]
      parameters:
        - $ref: '#/components/parameters/MonitorID'
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Monitor'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
    patch:
      summary: 更新监控
      description: 更新指定监控项的配置
      operationId: updateMonitor
      tags: [监控]
      parameters:
        - $ref: '#/components/parameters/MonitorID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMonitorRequest'
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Monitor'
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
    delete:
      summary: 删除监控
      description: 删除指定监控项
      operationId: deleteMonitor
      tags: [监控]
      parameters:
        - $ref: '#/components/parameters/MonitorID'
      responses:
        "204":
          description: 删除成功
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'

  /monitors/{id}/pause:
    post:
      summary: 暂停监控
      description: 暂停指定监控项的拨测
      operationId: pauseMonitor
      tags: [监控]
      parameters:
        - $ref: '#/components/parameters/MonitorID'
      responses:
        "200":
          description: 暂停成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Monitor'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'

  /monitors/{id}/resume:
    post:
      summary: 恢复监控
      description: 恢复已暂停的监控项
      operationId: resumeMonitor
      tags: [监控]
      parameters:
        - $ref: '#/components/parameters/MonitorID'
      responses:
        "200":
          description: 恢复成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Monitor'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'

  /alert-channels:
    get:
      summary: 获取告警通道列表
      operationId: listAlertChannels
      tags: [告警]
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertChannelListResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: 创建告警通道
      operationId: createAlertChannel
      tags: [告警]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAlertChannelRequest'
      responses:
        "201":
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertChannel'
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /alert-policies:
    get:
      summary: 获取告警策略列表
      operationId: listAlertPolicies
      tags: [告警]
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertPolicyListResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: 创建告警策略
      operationId: createAlertPolicy
      tags: [告警]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAlertPolicyRequest'
      responses:
        "201":
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertPolicy'
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /billing/subscribe:
    post:
      summary: 订阅付费计划
      operationId: billingSubscribe
      tags: [计费]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscribeRequest'
      responses:
        "200":
          description: 订阅成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscribeResponse'
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /billing/subscription:
    get:
      summary: 获取当前订阅信息
      operationId: getSubscription
      tags: [计费]
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /billing/invoices:
    get:
      summary: 获取账单列表
      operationId: listInvoices
      tags: [计费]
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceListResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /account/profile:
    get:
      summary: 获取用户资料
      operationId: getProfile
      tags: [账号]
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        "401":
          $ref: '#/components/responses/Unauthorized'
    patch:
      summary: 更新用户资料
      operationId: updateProfile
      tags: [账号]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /account/api-keys:
    get:
      summary: 获取 API Key 列表
      operationId: listAPIKeys
      tags: [账号]
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIKeyListResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: 创建 API Key
      operationId: createAPIKey
      tags: [账号]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAPIKeyRequest'
      responses:
        "201":
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIKeyCreated'
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /nodes:
    get:
      summary: 获取节点列表
      description: 获取所有可用的拨测节点信息
      operationId: listNodes
      security: []
      tags: [节点]
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeListResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: "使用 JWT access token 或 API Key（idc_live_xxx）进行鉴权"
    ApiKeyHeader:
      type: apiKey
      in: header
      name: X-API-Key
      description: "API Key 鉴权，格式：idc_live_xxx"

  parameters:
    MonitorID:
      name: id
      in: path
      required: true
      description: 监控项 ID
      schema:
        type: string
        example: "mon_01J8XXXXX"

  responses:
    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: 未认证或 token 无效
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: 资源冲突（如邮箱已注册）
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: 请求过于频繁，触发限流
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      required: [error, request_id]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: "INVALID_PARAM"
            message:
              type: string
              example: "参数错误"
            request_id:
              type: string
        request_id:
          type: string
          example: "req_01J8XXXXX"

    ProbeHTTPRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
          example: "https://github.com"
        method:
          type: string
          enum: [GET, POST, PUT, PATCH, DELETE, HEAD]
          default: GET
        headers:
          type: object
          additionalProperties:
            type: string
        body:
          type: string
        timeout:
          type: integer
          description: 超时时间（秒）
          default: 10
          maximum: 30
        nodes:
          type: array
          items:
            type: string
          description: 指定拨测节点 ID 列表，留空则自动选择

    ProbePingRequest:
      type: object
      required: [host]
      properties:
        host:
          type: string
          example: "8.8.8.8"
        count:
          type: integer
          default: 4
          maximum: 10
        timeout:
          type: integer
          default: 5
          maximum: 30
        nodes:
          type: array
          items:
            type: string

    ProbeDNSRequest:
      type: object
      required: [domain]
      properties:
        domain:
          type: string
          example: "github.com"
        record_type:
          type: string
          enum: [A, AAAA, MX, TXT, NS, CNAME, SOA]
          default: A
        server:
          type: string
          description: 自定义 DNS 服务器
          example: "8.8.8.8"
        nodes:
          type: array
          items:
            type: string

    ProbeTCPRequest:
      type: object
      required: [host, port]
      properties:
        host:
          type: string
          example: "github.com"
        port:
          type: integer
          minimum: 1
          maximum: 65535
          example: 443
        timeout:
          type: integer
          default: 5
          maximum: 30
        nodes:
          type: array
          items:
            type: string

    ProbeTracerouteRequest:
      type: object
      required: [host]
      properties:
        host:
          type: string
          example: "github.com"
        max_hops:
          type: integer
          default: 30
          maximum: 64
        timeout:
          type: integer
          default: 30
          maximum: 60
        nodes:
          type: array
          items:
            type: string

    ProbeResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            task_id:
              type: string
              example: "task_01J8XXXXX"
            status:
              type: string
              enum: [pending, running, done, error]
            results:
              type: array
              items:
                type: object
                properties:
                  node_id:
                    type: string
                  node_name:
                    type: string
                  success:
                    type: boolean
                  latency_ms:
                    type: number
                  error:
                    type: string
        request_id:
          type: string

    IPInfoResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            ip:
              type: string
              example: "8.8.8.8"
            country:
              type: string
              example: "US"
            country_name:
              type: string
              example: "美国"
            region:
              type: string
            city:
              type: string
            isp:
              type: string
              example: "Google LLC"
            asn:
              type: string
              example: "AS15169"
            latitude:
              type: number
            longitude:
              type: number
        request_id:
          type: string

    WhoisResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            domain:
              type: string
            registrar:
              type: string
            created_at:
              type: string
              format: date
            expires_at:
              type: string
              format: date
            name_servers:
              type: array
              items:
                type: string
            raw:
              type: string
        request_id:
          type: string

    SSLInfoResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            domain:
              type: string
            issuer:
              type: string
            subject:
              type: string
            valid_from:
              type: string
              format: date-time
            valid_to:
              type: string
              format: date-time
            days_remaining:
              type: integer
            san_domains:
              type: array
              items:
                type: string
            protocol:
              type: string
              example: "TLS 1.3"
            cipher:
              type: string
        request_id:
          type: string

    DNSRecordsResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            domain:
              type: string
            records:
              type: array
              items:
                type: object
                properties:
                  type:
                    type: string
                  value:
                    type: string
                  ttl:
                    type: integer
        request_id:
          type: string

    ICPResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            domain:
              type: string
            icp_number:
              type: string
              example: "京ICP备12345678号"
            company:
              type: string
            license_type:
              type: string
            approved_at:
              type: string
              format: date
        request_id:
          type: string

    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            access_token:
              type: string
            token_type:
              type: string
              example: "Bearer"
            expires_in:
              type: integer
              description: "有效期（秒），access token 15min = 900"
              example: 900
            user:
              $ref: '#/components/schemas/UserProfile'
        request_id:
          type: string

    UserProfile:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        display_name:
          type: string
        created_at:
          type: string
          format: date-time
        email_verified:
          type: boolean
        plan:
          type: string
          enum: [free, pro, business]

    UpdateProfileRequest:
      type: object
      properties:
        display_name:
          type: string

    Monitor:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [http, ping, tcp, dns, traceroute]
        url:
          type: string
        interval:
          type: integer
          description: "拨测间隔（秒）"
        status:
          type: string
          enum: [active, paused, error]
        created_at:
          type: string
          format: date-time

    CreateMonitorRequest:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [http, ping, tcp, dns, traceroute]
        url:
          type: string
        host:
          type: string
        port:
          type: integer
        interval:
          type: integer
          default: 60
        nodes:
          type: array
          items:
            type: string

    UpdateMonitorRequest:
      type: object
      properties:
        name:
          type: string
        interval:
          type: integer
        nodes:
          type: array
          items:
            type: string

    MonitorListResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/Monitor'
            total:
              type: integer
            page:
              type: integer
            per_page:
              type: integer
        request_id:
          type: string

    AlertChannel:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [email, webhook, dingtalk, wecom, feishu, sms, pagerduty, slack]
        config:
          type: object
        created_at:
          type: string
          format: date-time

    CreateAlertChannelRequest:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [email, webhook, dingtalk, wecom, feishu, sms, pagerduty, slack]
        config:
          type: object

    AlertChannelListResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/AlertChannel'
        request_id:
          type: string

    AlertPolicy:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        monitor_id:
          type: string
        channel_ids:
          type: array
          items:
            type: string
        conditions:
          type: object
        created_at:
          type: string
          format: date-time

    CreateAlertPolicyRequest:
      type: object
      required: [name, monitor_id]
      properties:
        name:
          type: string
        monitor_id:
          type: string
        channel_ids:
          type: array
          items:
            type: string
        conditions:
          type: object

    AlertPolicyListResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/AlertPolicy'
        request_id:
          type: string

    SubscribeRequest:
      type: object
      required: [plan]
      properties:
        plan:
          type: string
          enum: [pro, business]

    SubscribeResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            checkout_url:
              type: string
              format: uri
        request_id:
          type: string

    Subscription:
      type: object
      properties:
        id:
          type: string
        plan:
          type: string
          enum: [free, pro, business]
        status:
          type: string
          enum: [active, cancelled, past_due, trialing]
        current_period_end:
          type: string
          format: date-time

    InvoiceListResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            items:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                  amount:
                    type: number
                  currency:
                    type: string
                  status:
                    type: string
                  created_at:
                    type: string
                    format: date-time
        request_id:
          type: string

    APIKeyListResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            items:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  prefix:
                    type: string
                    example: "idc_live_xxx..."
                  created_at:
                    type: string
                    format: date-time
                  last_used_at:
                    type: string
                    format: date-time
        request_id:
          type: string

    CreateAPIKeyRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          description: API Key 名称（便于识别）

    APIKeyCreated:
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            key:
              type: string
              description: "完整 API Key，仅在创建时返回一次"
              example: "idc_live_01J8XXXXXXXXXXX"
            created_at:
              type: string
              format: date-time
        request_id:
          type: string

    NodeListResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            items:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  country:
                    type: string
                  region:
                    type: string
                  provider:
                    type: string
                  status:
                    type: string
                    enum: [online, offline, degraded]
        request_id:
          type: string

