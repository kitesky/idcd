  # =====================================================================
  # SECTION: Free Cert Module (apps/cert-svc, /v1/cert/*, 详 20-free-cert.md)
  # =====================================================================
  /v1/cert/orders:
    post:
      tags: [Cert]
      summary: 创建证书签发订单
      operationId: certCreateOrder
      description: |
        提交一笔免费证书签发请求。SANs / challenge_type / dns_credential_id
        必填(manual 模式 dns_credential_id 留空)。返回订单 id 与初始 status=draft。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sans, challenge_type]
              properties:
                sans: { type: array, items: { type: string } }
                common_name: { type: string }
                challenge_type: { type: string, enum: [dns-01] }
                dns_credential_id: { type: integer, format: int64 }
                ca: { type: string, enum: [lets-encrypt, zerossl, buypass] }
                tier: { type: string, default: free-dv }
                idempotency_key: { type: string }
      responses:
        '201':
          description: 订单已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertOrderResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '409': { $ref: '#/components/responses/Conflict' }
        '429': { $ref: '#/components/responses/RateLimited' }
    get:
      tags: [Cert]
      summary: 列出本账号证书订单
      operationId: certListOrders
      parameters:
        - { in: query, name: status, schema: { type: string } }
        - { in: query, name: limit,  schema: { type: integer, default: 20, maximum: 100 } }
        - { in: query, name: offset, schema: { type: integer, default: 0 } }
      responses:
        '200':
          description: 订单列表
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/CertOrderResponse' }

  /v1/cert/orders/{id}:
    get:
      tags: [Cert]
      summary: 查询单条订单详情
      operationId: certGetOrder
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200':
          description: 订单详情(含 WAL 进度摘要)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CertOrderResponse' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/cert/orders/{id}/retry:
    post:
      tags: [Cert]
      summary: 显式重试 failed 订单
      operationId: certRetryOrder
      description: 仅对 status=failed 的订单生效;复用既有 WAL 步骤。
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer, format: int64 } }
      responses:
        '202': { description: 已重新入队 }
        '409': { description: 订单状态非 failed }

  /v1/cert/orders/{id}/manual-ready:
    post:
      tags: [Cert]
      summary: 手动 DNS 模式 — 通知平台 TXT 记录已生效
      operationId: certManualReady
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fqdn, value]
              properties:
                fqdn:  { type: string }
                value: { type: string }
      responses:
        '202': { description: 已注入 Coordinator,worker 将继续 challenge }
        '404': { description: 无活跃 manual coordinator(worker 重启) }

  /v1/cert/certs:
    get:
      tags: [Cert]
      summary: 列出本账号已签发证书
      operationId: certListCerts
      parameters:
        - { in: query, name: status, schema: { type: string, enum: [issued, revoked, expired] } }
        - { in: query, name: limit,  schema: { type: integer, default: 20, maximum: 100 } }
        - { in: query, name: offset, schema: { type: integer, default: 0 } }
      responses:
        '200':
          description: 证书列表
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/CertResponse' }

  /v1/cert/certs/{id}:
    get:
      tags: [Cert]
      summary: 查询单张证书元数据(不含私钥)
      operationId: certGetCert
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200':
          description: 证书详情
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CertResponse' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/cert/certs/{id}/download:
    post:
      tags: [Cert]
      summary: 申请一次性签名下载链接(包含私钥)
      operationId: certIssueDownloadLink
      description: |
        生成 HMAC-SHA256 签名的一次性 token,5 分钟过期。返回的 download_url
        指向 /v1/cert/dl/{token},该子路径无需鉴权(token 本身即凭证)。
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200':
          description: 下载链接
          content:
            application/json:
              schema:
                type: object
                properties:
                  download_url: { type: string, format: uri }
                  expires_at:   { type: string, format: date-time }
        '503': { description: CERT_DOWNLOAD_SECRET 未配置 — 下载关闭 }

  /v1/cert/certs/{id}/revoke:
    post:
      tags: [Cert]
      summary: 撤销已签发证书
      operationId: certRevokeCert
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string, enum: [unspecified, keyCompromise, superseded, cessationOfOperation] }
      responses:
        '202': { description: 撤销已入队(WAL 写入 revoke_started) }

  /v1/cert/dns-credentials:
    post:
      tags: [Cert]
      summary: 新建 DNS Provider 凭据(字段级 KMS 加密)
      operationId: certCreateDNSCredential
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider, display_name, credential]
              properties:
                provider:     { type: string, enum: [cloudflare, aliyun, dnspod, route53, gcloud, manual] }
                display_name: { type: string }
                credential:   { type: object, additionalProperties: { type: string } }
      responses:
        '201':
          description: 凭据已创建
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DNSCredentialResponse' }
    get:
      tags: [Cert]
      summary: 列出本账号 DNS 凭据
      operationId: certListDNSCredentials
      responses:
        '200':
          description: 凭据列表
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/DNSCredentialResponse' }

  /v1/cert/dns-credentials/{id}:
    delete:
      tags: [Cert]
      summary: 撤销 DNS 凭据
      operationId: certDeleteDNSCredential
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer, format: int64 } }
      responses:
        '204': { description: 已撤销 }

  /v1/cert/dns-credentials/{id}/health-check:
    post:
      tags: [Cert]
      summary: 触发 DNS 凭据健康检查
      operationId: certHealthCheckDNSCredential
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200':
          description: 健康检查结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [ok, error, unknown] }
                  error:  { type: string }

  /v1/cert/dl/{token}:
    get:
      tags: [Cert]
      summary: 一次性 token 兑换 — 下载证书包
      operationId: certDownloadByToken
      security: []  # token 本身即凭证
      parameters:
        - { in: path, name: token, required: true, schema: { type: string } }
      responses:
        '200':
          description: 证书 ZIP / PEM 包
          content:
            application/zip:
              schema: { type: string, format: binary }
        '404': { description: token 不存在 / 已使用 }
        '410': { description: token 已过期 }

  # ---- Admin (VPN-only,后端通过 middleware 限路由) ----
  /v1/cert/admin/orders/{id}/force-fail:
    post:
      tags: [Cert]
      summary: 管理员强制将订单置为 failed(运维抢救)
      operationId: certAdminForceFail
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer, format: int64 } }
      responses:
        '202': { description: 已置 failed }

# =====================================================================
# COMPONENTS
# =====================================================================
components:
  securitySchemes:
    ApiKeyHeader:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        Core REST API 鉴权 — `X-API-Key: idc_live_xxx`。
        与 BearerAuth 二选一(同一 key)。详 03 §5。
        **MCP token 不能在此使用**:MCP token 走 `mcp.idcd.com` JSON-RPC,详 §MCP Tokens tag。
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: idc_live_xxx
      description: |
        Core REST API 鉴权 — `Authorization: Bearer idc_live_xxx`。
        与 ApiKeyHeader 二选一(同一 key)。
    PaymentHubWebhookSignature:
      type: apiKey
      in: header
      name: X-Webhook-Signature
      description: |
        聚合支付 webhook 签名(聚合支付服务商 → idcd 服务端,**反向接收**)。
        校验算法见 packages/payment-go-sdk;本规范不暴露 webhook 接收端 path。
    IdcdWebhookSignature:
      type: apiKey
      in: header
      name: X-IDCD-Signature
      description: |
        idcd → 用户 webhook 出站签名(`t=<unix_ts>,v1=<hmac_sha256_hex>`)。
        用户端验签:`hmac_sha256(secret, "<t>.<raw_body>")`;5 分钟新鲜度窗口。
        详 16-api-spec.md §10。

  parameters:
    Page:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    PageSize:
      name: page_size
      in: query
      schema: { type: integer, minimum: 1, maximum: 200, default: 20 }
    ResourceId:
      name: id
      in: path
      required: true
      schema: { type: string }
      description: 资源 ID(带语义前缀,如 `m_xyz`, `v_xyz`, `mcpt_xyz`)
    FromTime:
      name: from
      in: query
      schema: { type: string, format: date-time }
      description: 起始时间 ISO 8601 UTC;支持相对 `-7d` / `-1h`
    ToTime:
      name: to
      in: query
      schema: { type: string, format: date-time }
      description: 结束时间 ISO 8601 UTC

  responses:
    BadRequest:
      description: 400 请求参数错误 / 校验失败
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: 401 未鉴权 / API Key 无效 / 已撤销 / 已过期
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: 403 权限不足 / scope 不足 / 档位限制
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: 404 资源不存在
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Conflict:
      description: 409 资源冲突 / 已存在
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    PayloadTooLarge:
      description: 413 请求 body 超出限制(32KB)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unprocessable:
      description: 422 业务校验失败(目标命中黑名单 / 节点不足 / 数据缺失 等)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    RateLimited:
      description: 429 限速 / 配额超出
      headers:
        Retry-After:
          schema: { type: integer }
          description: 建议等待秒数
        X-RateLimit-Limit:
          schema: { type: integer }
        X-RateLimit-Remaining:
          schema: { type: integer }
        X-RateLimit-Reset:
          schema: { type: string, format: date-time }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    InternalError:
      description: 5xx 服务端错误
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    ServiceUnavailable:
      description: 503 服务不可用(维护 / 过载 / 节点不可用)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:
    # ---------- 通用 ----------
    Error:
      type: object
      required: [error, meta]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: |
                统一错误码。完整列表详 16-api-spec.md §2.9:
                `unauthorized` / `invalid_api_key` / `api_key_revoked` / `api_key_expired` /
                `forbidden` / `scope_required` / `validation_error` / `invalid_target` /
                `target_in_denylist` / `target_unresolvable` / `target_high_risk` /
                `unsupported_protocol` / `not_found` / `already_exists` / `conflict` / `gone` /
                `precondition_failed` / `request_too_large` / `unsupported_media` /
                `rate_limit_exceeded` / `quota_exceeded` / `idempotency_key_mismatch` /
                `payment_required` / `internal_error` / `service_unavailable` /
                `node_unavailable` / `gateway_timeout`
              example: validation_error
            message:
              type: string
              example: Invalid request
            details:
              type: object
              description: 字段级错误等
              additionalProperties: true
            doc_url:
              type: string
              format: uri
              example: https://docs.idcd.com/errors/validation_error
        meta:
          type: object
          properties:
            request_id:
              type: string
              example: req_xyz

    Meta:
      type: object
      properties:
        request_id: { type: string, example: req_xyz }
        took_ms: { type: integer, example: 42 }
        rate_limit:
          type: object
          properties:
            limit: { type: integer, example: 5000 }
            remaining: { type: integer, example: 4982 }
            reset: { type: string, format: date-time }
        pagination:
          type: object
          properties:
            page: { type: integer }
            page_size: { type: integer }
            total: { type: integer }
            has_more: { type: boolean }
            next_cursor: { type: string }
        cache:
          type: object
          properties:
            hit: { type: boolean }
            age_sec: { type: integer }

    Envelope:
      type: object
      description: 所有响应的标准 envelope(data + meta)
      properties:
        data: {}
        meta: { $ref: '#/components/schemas/Meta' }

    NodeSelection:
      type: object
      description: 节点选择(详 04 §3 / 08 §5)
      properties:
        mode:
          type: string
          enum: [pool, fixed]
          default: pool
          description: pool=自动从池中挑选 N 个;fixed=指定节点 ID
        size:
          type: integer
          minimum: 1
          maximum: 50
          default: 3
        regions:
          type: array
          items: { type: string }
          example: [CN, US, EU]
        isps:
          type: array
          items: { type: string }
          example: [chinatelecom, chinaunicom]
        tags:
          type: array
          items: { type: string }
        ids:
          type: array
          items: { type: string }
          description: 节点 ID 列表(mode=fixed 必填)

    Assertion:
      type: object
      properties:
        type:
          type: string
          enum: [status_code, response_time, body_contains, body_regex, json_path, header_value, ssl_days_remaining]
        op:
          type: string
          enum: [eq, ne, gt, gte, lt, lte, in, not_in, contains, regex]
        value: {}

    # ---------- Auth / User ----------
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 12 }
        invite_code: { type: string }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
        otp: { type: string, description: 2FA TOTP(若启用) }

    AuthResponse:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        expires_in: { type: integer, example: 3600 }
        user: { $ref: '#/components/schemas/User' }

    User:
      type: object
      properties:
        id: { type: string, example: u_aBcDeFg }
        email: { type: string, format: email }
        username: { type: string }
        plan: { type: string, enum: [free, pro, team, business, agent_pro, compliance_starter, compliance_pro, compliance_enterprise] }
        created_at: { type: string, format: date-time }

    UserResponse:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/User' }

    # ---------- API Key ----------
    CreateApiKeyRequest:
      type: object
      required: [name, scopes]
      properties:
        name: { type: string }
        scopes:
          type: array
          items: { type: string, enum: [probe, probe:read, monitor:read, monitor:write, alert:read, alert:write, status:read, status:write, billing:read, billing:write] }
        allowed_origins:
          type: array
          items: { type: string }
        expires_at: { type: string, format: date-time, nullable: true }

    ApiKey:
      type: object
      properties:
        id: { type: string, example: ak_xyz }
        name: { type: string }
        prefix: { type: string, example: idc_live_ }
        token_display: { type: string, example: "idc_live_***1234" }
        scopes:
          type: array
          items: { type: string }
        revoked: { type: boolean }
        created_at: { type: string, format: date-time }
        last_used_at: { type: string, format: date-time, nullable: true }
        expires_at: { type: string, format: date-time, nullable: true }

    CreateApiKeyResponse:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              type: object
              properties:
                key: { $ref: '#/components/schemas/ApiKey' }
                secret:
                  type: string
                  description: API Key 完整 secret;**仅返回一次**;务必保存。
                  example: idc_live_aBcDeF...

    ApiKeyListResponse:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/ApiKey' }

    # ---------- Probe ----------
    HttpProbeRequest:
      type: object
      required: [url]
      properties:
        url: { type: string, format: uri, example: "https://example.com" }
        method:
          type: string
          enum: [GET, HEAD, POST, PUT, DELETE, OPTIONS, PATCH]
          default: GET
        headers:
          type: object
          additionalProperties: { type: string }
        body: { type: string, maxLength: 32768 }
        timeout_ms: { type: integer, minimum: 1000, maximum: 30000, default: 10000 }
        follow_redirect: { type: boolean, default: true }
        ip_version: { type: string, enum: [v4, v6, auto], default: auto }
        nodes: { $ref: '#/components/schemas/NodeSelection' }
        wait: { type: string, enum: [sync, async], default: sync }
        callback_url:
          type: string
          format: uri
          description: async 模式必填;拨测完成回调此 URL

    PingProbeRequest:
      type: object
      required: [target]
      properties:
        target: { type: string, example: "1.1.1.1" }
        count: { type: integer, minimum: 1, maximum: 50, default: 4 }
        timeout_ms: { type: integer, default: 5000 }
        ip_version: { type: string, enum: [v4, v6, auto], default: auto }
        nodes: { $ref: '#/components/schemas/NodeSelection' }

    TcpingProbeRequest:
      type: object
      required: [target, port]
      properties:
        target: { type: string }
        port: { type: integer, minimum: 1, maximum: 65535 }
        count: { type: integer, minimum: 1, maximum: 50, default: 4 }
        timeout_ms: { type: integer, default: 5000 }
        nodes: { $ref: '#/components/schemas/NodeSelection' }

    DnsProbeRequest:
      type: object
      required: [domain]
      properties:
        domain: { type: string, example: "example.com" }
        type:
          type: string
          enum: [A, AAAA, CNAME, MX, TXT, NS, SOA, CAA, ANY]
          default: A
        server: { type: string, description: 自定义 DNS server }
        nodes: { $ref: '#/components/schemas/NodeSelection' }

    TracerouteRequest:
      type: object
      required: [target]
      properties:
        target: { type: string }
        max_hops: { type: integer, default: 30 }
        nodes: { $ref: '#/components/schemas/NodeSelection' }

    ProbeTaskAccepted:
      type: object
      properties:
        task_id: { type: string, example: pt_xyz }
        status: { type: string, enum: [running] }
        callback_url: { type: string }

    HttpProbeResponse:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              type: object
              properties:
                task_id: { type: string, example: pt_xyz }
                status: { type: string, enum: [running, completed, failed] }
                target: { type: string }
                summary:
                  type: object
                  properties:
                    success_count: { type: integer }
                    fail_count: { type: integer }
                    avg_response_ms: { type: number }
                    p95_response_ms: { type: number }
                node_results:
                  type: array
                  items:
                    type: object
                    properties:
                      node_id: { type: string }
                      node:
                        type: object
                        properties:
                          country: { type: string }
                          city: { type: string }
                          isp: { type: string }
                          asn: { type: integer }
                      success: { type: boolean }
                      status_code: { type: integer }
                      response_ms: { type: integer }
                      timing:
                        type: object
                        properties:
                          dns_ms: { type: integer }
                          tcp_ms: { type: integer }
                          tls_ms: { type: integer }
                          ttfb_ms: { type: integer }
                          download_ms: { type: integer }
                      tls:
                        type: object
                        properties:
                          version: { type: string }
                          cipher: { type: string }
                      response_size: { type: integer }
                      final_url: { type: string }
                      headers:
                        type: object
                        additionalProperties: { type: string }
                      error: { type: string, nullable: true }

    PingProbeResponse:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              type: object
              properties:
                task_id: { type: string }
                target: { type: string }
                summary:
                  type: object
                  properties:
                    avg_ms: { type: number }
                    min_ms: { type: number }
                    max_ms: { type: number }
                    packet_loss: { type: number }
                node_results:
                  type: array
                  items: { type: object, additionalProperties: true }

    DnsProbeResponse:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              type: object
              properties:
                domain: { type: string }
                type: { type: string }
                records_by_node:
                  type: array
                  items:
                    type: object
                    properties:
                      node_id: { type: string }
                      records:
                        type: array
