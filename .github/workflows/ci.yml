name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.modified, '.go') ||
      contains(github.event.head_commit.added, '.go') ||
      github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  go-test:
    name: Go Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run tests
        # Go 1.26 起 `go test ./...` 不再从 workspace 根自动展开到全部 module
        # ("directory prefix . does not contain modules listed in go.work")。
        # 逐 module 跑测试，再把每个 module 的 coverage 合并成根的 coverage.out
        # 给 codecov 上传步骤用。
        run: |
          set -euo pipefail
          echo "mode: atomic" > coverage.out
          for moddir in $(go list -m -f '{{.Dir}}'); do
            echo "::group::go test $moddir"
            (
              cd "$moddir"
              go test -v -race -covermode=atomic -coverprofile=cov.tmp ./...
            )
            if [ -f "$moddir/cov.tmp" ]; then
              tail -n +2 "$moddir/cov.tmp" >> coverage.out
              rm "$moddir/cov.tmp"
            fi
            echo "::endgroup::"
          done

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

  go-build:
    name: Go Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build all modules
        run: |
          for dir in apps/*/; do
            if [ -f "$dir/go.mod" ]; then
              echo "Building $dir..."
              (cd "$dir" && go build -v ./...)
            fi
          done

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.modified, 'apps/web/') ||
      contains(github.event.head_commit.added, 'apps/web/') ||
      github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Install dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        working-directory: apps/web
        run: pnpm lint

  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Install dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: Run tests
        working-directory: apps/web
        run: pnpm test --passWithNoTests

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Install dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: apps/web
        run: pnpm build

  schema-lint:
    name: Schema Lint
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.modified, 'migrations/') ||
      contains(github.event.head_commit.added, 'migrations/') ||
      github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run cross-schema FK check
        run: bash scripts/lint-cross-schema-fk.sh

      - name: Run attestation words check
        run: bash scripts/lint-attestation-words.sh
