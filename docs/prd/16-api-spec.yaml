  # =====================================================================
  # SECTION: MCP TOKENS (D2 锁定:无永久 token + 三种形态)
  # =====================================================================
  /mcp/tokens:
    get:
      tags: [MCP Tokens]
      summary: 列出 MCP token
      operationId: listMcpTokens
      description: |
        列出当前账户的 MCP token(token 原文不返回,只返回 `token_display` 后 4 位 + 前缀)。
        MCP token **不同于** API Key — MCP token 走 `mcp.idcd.com`,只能给 MCP client(Cursor / Claude Code / Codex)使用;
        API Key 走 `api.idcd.com`,给 REST 客户端使用。
        计量也完全独立(D2):MCP units 与 API calls 是两条独立量表。
      parameters:
        - name: type
          in: query
          schema: { type: string, enum: [personal, workspace, service] }
        - name: revoked
          in: query
          schema: { type: boolean }
      responses:
        '200':
          description: token 列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/McpTokenListResponse'
    post:
      tags: [MCP Tokens]
      summary: 签发 MCP token
      operationId: createMcpToken
      description: |
        **D2 锁定规则**:
        - 所有 token 都有过期日;`expires_at` 必填,最长 90 天
        - **personal**:24h,OAuth-like 自动 refresh,IP 白名单可选
        - **workspace**:90d,过期前 24h auto_renewal(基于 last_used_at;超 30 天未用不续),IP 白名单可选
        - **service**:90d,过期前 24h auto_renewal,**IP 白名单强制**(无白名单不签发,返回 422)

        响应中 `token` 字段是完整 token 明文,**仅此一次返回**;后续接口只能拿到 `token_display`。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMcpTokenRequest'
      responses:
        '201':
          description: 签发成功(token 仅返回一次)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateMcpTokenResponse'
        '422':
          description: service token 缺少 IP 白名单 / 其他校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /mcp/tokens/{id}:
    parameters:
      - $ref: '#/components/parameters/ResourceId'
    delete:
      tags: [MCP Tokens]
      summary: 撤销 MCP token
      operationId: revokeMcpToken
      description: |
        即时撤销:所有 active SSE 连接通过 Redis pub-sub broadcast 立即断开(详 12 §22)。
        被撤销的 token 调用历史保留可审计;`revoked=true` 标记;前端用红色显示。
      responses:
        '204':
          description: 撤销成功
        '404': { $ref: '#/components/responses/NotFound' }

  # =====================================================================
  # SECTION: AGENT OBSERVABILITY (M21-M23 + SSE event stream)
  # =====================================================================
  /agent-obs/monitors:
    get:
      tags: [Agent Observability]
      summary: 列出 Agent obs 监控项
      operationId: listAgentObsMonitors
      parameters:
        - name: type
          in: query
          schema: { type: string, enum: [llm, tool, rag, other] }
        - name: status
          in: query
          schema: { type: string, enum: [active, paused, exceeded_budget] }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
