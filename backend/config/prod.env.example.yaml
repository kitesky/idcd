# idcd 生产环境配置
# 部署路径: /opt/idcd/config/prod.env.yaml（不入 git）
# 启动方式: IDCD_CONFIG=/opt/idcd/config/prod.env.yaml /bin/api
#
# 读取此文件的服务：api / notifier / gateway / scheduler / aggregator
# aggregator 通过 AGGREGATOR_CONFIG=/config/prod.env.yaml env 复用本文件，依赖底部 aggregator: 段
#
# 生成随机密钥: openssl rand -hex 32

# ── 数据库（云托管，填入云服务商连接串）──────────────────────────
database:
  dsn: "postgresql://idcd:CHANGE_ME@云DB_HOST:5432/idcd"        # scheduler 用
  main:
    dsn: "postgresql://idcd:CHANGE_ME@云DB_HOST:5432/idcd"      # api/notifier/gateway 用
    max_open_conns: 20
    max_idle_conns: 5
    conn_max_lifetime: "5m"

# ── Redis（云托管）──────────────────────────────────────────────
redis:
  addr: "云REDIS_HOST:6379"
  password: "CHANGE_ME"
  db: 0

# ── API 服务器 ───────────────────────────────────────────────────
server:
  port: 8080
  env: "production"
  admin_token: "GENERATE: openssl rand -hex 32"   # 必填，用于 /internal/admin/* 接口；启动期校验 ≥ 64 hex
  # /internal/admin/* IP 白名单 — 生产必须设置（堡垒机 / VPN / NAT 出口 IP 段）
  # 留空 = 允许任何 IP，仅靠 admin_token 防护，生产不推荐
  admin_ip_allowlist:
    - "10.0.0.0/8"                                # 内网 VPN
    # - "203.0.113.10/32"                         # 办公室固定出口
  # /internal/admin/* Origin/Referer 白名单 — 浏览器后台访问时校验
  # 若 admin 控制台部署在独立子域，填入；不部署浏览器后台留空
  admin_origins:
    - "https://admin.idcd.com"
  cors_origins:
    - "https://idcd.com"
    - "https://www.idcd.com"
  rp_id: "idcd.com"                               # WebAuthn Relying Party ID
  app_base_url: "https://idcd.com"                # 邮件深链接 / 支付完成跳回前端
  public_api_url: "https://api.idcd.com"          # 支付/退款 webhook 回调地址；必填，禁止用请求头推断

# ── JWT ──────────────────────────────────────────────────────────
jwt:
  secret: "GENERATE: openssl rand -hex 32"        # 必填，至少 32 字节
  access_ttl: "15m"
  refresh_ttl: "7d"

# ── Notifier（Resend SMTP）──────────────────────────────────────
notifier:
  smtp:
    host: "smtp.resend.com"
    port: 587
    username: "resend"
    password: "re_CHANGE_ME"              # Resend API Key
    from: "noreply@idcd.com"             # 已在 Resend 验证的域名
    from_name: "idcd"
  asynq_redis_dsn: "redis://:CHANGE_ME@云REDIS_HOST:6379/0"
  workers: 4
  queues:                              # key 名必须匹配 enqueue 端实际写入的 queue
    "notifier:default": 1              # 普通通知（低优）
    "notifier:critical": 2             # 关键通知（高优）
    billing: 5                         # D5 退款重试 — 支付链路最高优

# ── Agent Gateway ────────────────────────────────────────────────
agent_gateway:
  addr: "0.0.0.0:8443"
  ca_cert: "/certs/ca.crt"               # 生产 mTLS CA 证书路径
  public_wss: "wss://gateway.idcd.com"   # 对外暴露给 agent 的 WSS 地址
  internal_url: "http://127.0.0.1:8081"

# ── cert-svc 反代上游（api + gateway 读取）──────────────────────
# api 把 /v1/cert/* 和 /v1/admin/cert/* 反代到 cert-svc。内网链路，无 mTLS。
# 端口必须与 docker-compose.prod.yml 里 cert-svc 容器内端口对齐
# （默认 8080；由 infra/docker/cert-svc.env 的 CERT_SVC_PORT 控制）。
# 留空 = 关闭反代，api/handler/cert.go 的 stub 接管（list 空数组 / 写 501）。
cert_svc_url: "http://cert-svc:8080"

# ── idcd.com/status 数据采集 ─────────────────────────────────────
# 每 interval 探一次所有 services + 节点，落表 status_uptime_5min。
# probe 判定：2xx + <degraded_ms = operational；2xx + ≥degraded_ms = degraded；
#            非 2xx / 超时 = outage。
# URL 走 docker-compose 容器内主机名，无需对外暴露端口。
status_probe:
  enabled: true
  interval: "5m"
  timeout: "3s"
  degraded_ms: 1000
  services:
    api:        "http://api:8000/health"
    cert-svc:   "http://cert-svc:9090/metrics"
    gateway:    "http://gateway:8090/health"
    aggregator: "http://aggregator:9091/metrics"
    notifier:   "http://notifier:9092/metrics"
    web:        "http://web:3000/api/healthz"

# ── Scheduler ────────────────────────────────────────────────────
leader:
  key: "scheduler:leader"
  ttl: "10s"
# worker.count 在 2026-05-16 移除 (scheduler 已删 ZSET worker pool)；
# 现仅 monitor polling 在跑，并发由 poll 节拍决定，不需要配置。

# ── OAuth ────────────────────────────────────────────────────────
oauth:
  callback_base: "https://api.idcd.com"
  dingtalk:
    app_id: ""
    app_secret: ""
  feishu:
    app_id: ""
    app_secret: ""

# ── 字段级加密 ───────────────────────────────────────────────────
encryption:
  # 生成: openssl rand -hex 32
  # 必填，不可留空；密钥丢失则加密字段永久不可读
  field_key: "GENERATE: openssl rand -hex 32"

# ── 支付 ─────────────────────────────────────────────────────────
payment:
  enabled: true
  base_url: "https://payment-api.idcd.com"
  api_key: "pk_live_CHANGE_ME"
  api_secret: "sk_live_CHANGE_ME"
  webhook_secret: "whsec_CHANGE_ME"
  channel: "alipay"
  currency: "CNY"

# ── 速率限制 ─────────────────────────────────────────────────────
# 生产建议：遇到 credential stuffing 时临时缩到 auth.max_requests=2 + window=2m。
# 字段缺省 → 走代码内默认值（auth = 5/min/IP, twofa = 5/15min/user）。
rate_limit:
  auth:
    window: "1m"
    max_requests: 5
  twofa:
    window: "15m"
    max_requests: 5

# ── 可观测性 ─────────────────────────────────────────────────────
observability:
  prometheus_port: 9091
  otel_endpoint: ""    # OTLP gRPC，如 http://otel-collector:4317
  loki_endpoint: ""
  sentry_dsn: ""
  telemetry:
    enabled: false
    otlp_endpoint: ""
    sampling_rate: 0.1

# ── cert-svc 配置（P1-8 env → YAML 回迁）──────────────────────────
# 启动方式：IDCD_CONFIG=/opt/idcd/config/prod.env.yaml ./cert-svc
# 敏感 secret 仍通过 env 注入：CERT_JWT_SECRET / CERT_MASTER_KEY /
# CERT_DOWNLOAD_SECRET / CERT_ADMIN_TOKEN
cert_svc:
  port: 8082
  metrics_port: 9090
  env: "production"
  le_env: "production"           # Let's Encrypt 生产端点（真实证书）
  log_level: "info"
  acme_account_email: "acme@idcd.com"
  database:
    dsn: "postgres://cert_svc:CHANGE_ME@云DB_HOST:5432/idcd?sslmode=require"
  redis:
    addr: "云REDIS_HOST:6379"
    password: "CHANGE_ME"
    db: 0
    # Sentinel 高可用：
    # master_name: "mymaster"
    # sentinel_addrs: ["sentinel1:26379", "sentinel2:26379"]
  vault:
    backend: "alikms"            # 生产必须用 alikms 或 awskms（D-FC-04）
    alikms:
      region_id: "cn-hangzhou"
      access_key_id: "CHANGE_ME"
      access_key_secret: "CHANGE_ME"
      key_id: "alias/cert-master"
    awskms:
      region: ""
      access_key_id: ""
      secret_access_key: ""
      key_id: ""
    hashivault:
      address: ""
      token: "CHANGE_ME"
      namespace: ""
      key_name: ""
      mount_path: ""
  zerossl_eab_kid: ""
  zerossl_eab_hmac_key: ""
  buypass_env: ""

# ── attest 配置（P1-8 env → YAML 回迁）────────────────────────────
# 启动方式：IDCD_CONFIG=/opt/idcd/config/prod.env.yaml ./attest-server
# 敏感 secret 仍通过 env 注入：ATTEST_PAYMENT_HUB_WEBHOOK_SECRET
attest:
  port: 8083
  env: "production"
  log_level: "info"
  database:
    dsn: "postgres://attest:CHANGE_ME@云DB_HOST:5432/idcd?sslmode=require"
  redis:
    addr: "云REDIS_HOST:6379"
    password: "CHANGE_ME"
    db: 0
  sign_backend: "aliyun"        # 生产必须用 aws 或 aliyun（D-FC-04）
  awskms:
    region: ""
    access_key_id: ""
    secret_access_key: ""
    key_id: ""
    algorithm: "ECDSA_SHA_256"
  alikms:
    region_id: "cn-hangzhou"
    access_key_id: "CHANGE_ME"
    access_key_secret: "CHANGE_ME"
    key_id: "alias/attest-sign"
    algorithm: "ECDSA_SHA_256"
  local_key_path: ""
  local_algorithm: ""
  tsa:
    providers:
      - "digicert"
      - "globalsign"
  archiver_backend: "s3"        # 生产用 S3+ObjectLock WORM 归档
  local_archive_dir: ""
  s3:
    endpoint: ""
    bucket: "idcd-attest-archive-prod"
    region: "ap-southeast-1"
    access_key: ""              # 推荐用 IAM role/instance profile
    secret_key: ""
    object_lock_mode: "COMPLIANCE"
    object_lock_days: 3650
    key_prefix: ""
  verify_endpoint: "https://attest.idcd.com/verify"
  refund:
    initiate_stream: "refund_initiate_queue"
    retry_stream: "refund_retry_queue"
    delay_zone_key: "refund_delay_zone"
    group: "attest-refund-worker"
    consumer: "attest-refund-worker-1"
    notifier_addr: "redis://:CHANGE_ME@云REDIS_HOST:6379/0"
    notifier_queue: "billing"

# ── Aggregator（Redis Stream → Postgres 持久化 worker） ──────────
# aggregator 与 api/notifier 复用同一 prod.env.yaml（通过 AGGREGATOR_CONFIG env 指过来）。
# redis_addr / pg_dsn 必须与上面的 redis.addr / database.main.dsn 保持一致。
aggregator:
  redis_addr: "云REDIS_HOST:6379"
  pg_dsn: "postgresql://idcd:CHANGE_ME@云DB_HOST:5432/idcd"
  stream_name: "probe.results"
  group_name: "aggregator-group"
  consumer_count: 4
  batch_size: 10
  block_timeout: "5s"
