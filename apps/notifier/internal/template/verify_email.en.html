<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email verification code</title>
    <style>
        body { margin: 0; padding: 0; background-color: #f4f4f4; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .container { width: 100%; max-width: 600px; margin: 0 auto; background-color: #ffffff; }
        .header { background-color: #2563eb; padding: 20px; text-align: center; }
        .logo { color: #ffffff; font-size: 24px; font-weight: bold; }
        .content { padding: 40px 20px; text-align: center; }
        .code-box { background-color: #f8fafc; border: 2px solid #e5e7eb; border-radius: 8px; padding: 20px; margin: 30px 0; display: inline-block; }
        .code { font-size: 32px; font-weight: bold; color: #2563eb; letter-spacing: 8px; font-family: 'Courier New', monospace; }
        .expires { color: #6b7280; font-size: 14px; margin-top: 20px; }
        .footer { background-color: #f8fafc; padding: 20px; text-align: center; color: #6b7280; font-size: 12px; border-top: 1px solid #e5e7eb; }
        @media (max-width: 600px) {
            .content { padding: 30px 15px; }
            .code { font-size: 24px; letter-spacing: 4px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">idcd</div>
        </div>
        <div class="content">
            <h1 style="color: #1f2937; margin-bottom: 20px;">Verify your email address</h1>
            <p style="color: #4b5563; line-height: 1.6; margin-bottom: 30px;">
                Thanks for signing up for idcd. Use the verification code below to confirm your email address:
            </p>
            <div class="code-box">
                <div class="code">{{.Code}}</div>
            </div>
            <p class="expires">This code expires in {{.ExpiresIn}}.</p>
            <p style="color: #6b7280; font-size: 14px; margin-top: 40px;">
                If you didn't sign up for idcd, you can safely ignore this email.
            </p>
        </div>
        <div class="footer">
            © 2026 idcd.com — Professional network diagnostics
        </div>
    </div>
</body>
</html>
