  # =====================================================================
  # SECTION: VERDICT (Evidence-as-a-Service, attest.idcd.com)
  # =====================================================================
  /verdict/quote:
    post:
      tags: [Verdict]
      servers:
        - url: https://attest.idcd.com/v1
      summary: Verdict 报价 + 数据可用性预检
      operationId: createVerdictQuote
      description: |
        在创建订单前检查:
        1. **数据可用性** — 目标在指定时间窗内是否有足够监控历史(≥3 节点连续观测)
        2. **目标合规** — 目标是否命中黑名单 / 不可测项目
        3. **价格** — 返回模板对应价格(SLA ¥299 / Incident ¥199 / Compliance ¥499 / Legal ¥999, K5 锁定)

        若 `eligible=false`,响应中 `reason` 字段说明原因(数据不足 / 目标黑名单 / 节点<3 等)。
        客户端应根据 `eligible` 决定是否进入下单流程。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerdictQuoteRequest'
      responses:
        '200':
          description: 报价 + 预检结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerdictQuoteResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '422': { $ref: '#/components/responses/Unprocessable' }

  /verdict/orders:
    post:
      tags: [Verdict]
      servers:
        - url: https://attest.idcd.com/v1
      summary: 创建 Verdict 订单
      operationId: createVerdictOrder
      description: |
        创建订单 → 返回 聚合支付 checkout URL(用户跳转支付)。
        支付完成由 聚合支付 webhook → `verdict_order(status=paid)` → 进入 generation queue。
        状态机:`pending → paid → generating → delivered`(成功)或
        `pending → paid → generating → failed → refunded`(D5 兑底)或
        `... → refund_failed`(D5 兑底失败,P0 告警 + admin dashboard)。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVerdictOrderRequest'
      responses:
        '201':
          description: 订单创建成功 + 聚合支付 checkout URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateVerdictOrderResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '422': { $ref: '#/components/responses/Unprocessable' }

  /verdict/orders/{id}:
    parameters:
      - $ref: '#/components/parameters/ResourceId'
    servers:
      - url: https://attest.idcd.com/v1
    get:
      tags: [Verdict]
      summary: 订单状态查询
      operationId: getVerdictOrder
      description: |
        返回完整状态机字段。SLA 承诺:90% 报告 60s 内生成,99% 5min 内。
        失败 → `status=failed → refunded`;refund 兑底失败 → `status=refund_failed`(D5)。
      responses:
        '200':
          description: 订单详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerdictOrder'
        '404': { $ref: '#/components/responses/NotFound' }

