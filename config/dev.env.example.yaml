# idcd 开发环境配置示例
# 复制本文件为 dev.env.yaml 并填入真实值。
# dev.env.yaml 已 gitignore，绝对不要提交真实凭据。

database:
  main:
    dsn: "postgresql://idcd_dev:CHANGE_ME@DB_HOST:5432/idcd_dev"
    max_open_conns: 20
    max_idle_conns: 5
    conn_max_lifetime: "5m"

redis:
  addr: "REDIS_HOST:6379"
  password: "CHANGE_ME"
  db: 0

server:
  port: 8080
  env: "development"  # development | staging | production
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:3001"

jwt:
  secret: "CHANGE_ME_at_least_32_chars_random_string"
  access_ttl: "15m"
  refresh_ttl: "7d"

email:
  smtp_host: "localhost"
  smtp_port: 25
  from_addr: "noreply@idcd.com"
  from_name: "idcd"

observability:
  prometheus_port: 9091        # 本地 metrics 端口
  otel_endpoint: ""            # OTLP gRPC, e.g. http://localhost:4317
  loki_endpoint: ""            # e.g. http://localhost:3100
  sentry_dsn: ""

agent_gateway:
  addr: "localhost:8443"
  ca_cert: "certs/dev-ca.crt"  # mTLS CA（开发用自签）

kms:
  provider: "dev_plaintext"    # dev_plaintext | aws | aliyun
  key_id: ""
