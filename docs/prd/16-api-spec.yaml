      summary: 报告详情 + PDF 下载链接
      operationId: getVerdictReport
      description: |
        返回报告详情(签名 / TSA / 节点列表 / self_verify_status / `report_type=observation_only`)。
        `pdf_url` 是 S3 预签名链接(有效期 1 小时,可重新获取);`archived_url` 是 WORM 永久归档链接。
      responses:
        '200':
          description: 报告详情
          content:
            application/json:
