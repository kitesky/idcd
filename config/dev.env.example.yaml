# idcd 开发环境配置
# cp config/dev.env.example.yaml config/dev.env.yaml  然后填入真实值
# dev.env.yaml 已 gitignore，禁止提交真实凭据
#
# 读取此文件的服务：api / notifier / gateway / scheduler
# aggregator 单独使用 config/aggregator.yaml

# ── 数据库 ──────────────────────────────────────────────────────
# database.main.dsn 供 api / notifier / gateway 读取
# database.dsn      供 scheduler 读取（两者指向同一个 DB）
database:
  dsn: "postgresql://idcd_dev:CHANGE_ME@DB_HOST:5432/idcd_dev"
  main:
    dsn: "postgresql://idcd_dev:CHANGE_ME@DB_HOST:5432/idcd_dev"
    max_open_conns: 20
    max_idle_conns: 5
    conn_max_lifetime: "5m"

# ── Redis ────────────────────────────────────────────────────────
redis:
  addr: "REDIS_HOST:6379"
  password: "CHANGE_ME"
  db: 0

# ── API 服务器 ───────────────────────────────────────────────────
server:
  port: 8080
  env: "development"           # development | staging | production
  admin_token: "GENERATE: openssl rand -hex 32"   # 必须 ≥ 64 hex (= 32 bytes 熵)，启动期会校验
  # admin_ip_allowlist: 限制 /internal/admin/* 直连 IP（含 X-Forwarded-For 经可信代理后的真实 IP）
  # 留空 = 不限（dev 默认）；生产强烈建议填 VPN/办公室/堡垒机网段，单 IP 自动当 /32
  admin_ip_allowlist: []
  # admin_origins: 浏览器后台访问 /internal/admin/* 时的 Origin/Referer 白名单
  # 留空 = 不校验 Origin（适用于纯 server-to-server admin 工具）
  # 部署 web 管理后台后填入 admin 控制台域名，如 ["https://admin.idcd.com"]
  admin_origins: []
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:3001"
  rp_id: "localhost"           # WebAuthn Relying Party ID（生产改为 idcd.com）
  app_base_url: "http://localhost:3000"  # 邮件深链接 / 支付完成跳回前端，生产改为 https://idcd.com
  public_api_url: "http://localhost:8080"  # 支付/退款 webhook 回调本地 API；生产改为 https://api.idcd.com
                                          # 必须从配置读，禁止用 Origin/Host 推断（伪造头会劫持 webhook）
  # pin_probe_node: "nd_xxx"    # 可选：dev 共享 redis 时锁定 probe 路由到本地 agent node_id，
  #                             # 避免一半 task 被远程 gateway 抢走卡在 PEL；生产留空让 LB 自动随机

# ── JWT ──────────────────────────────────────────────────────────
jwt:
  secret: "GENERATE: openssl rand -hex 32"
  access_ttl: "15m"
  refresh_ttl: "7d"

# ── Notifier（邮件 + Asynq 队列）───────────────────────────────
# 使用 Resend SMTP relay：https://resend.com → 创建 API Key → 验证发件域名
notifier:
  smtp:
    host: "smtp.resend.com"
    port: 587
    username: "resend"
    password: "re_CHANGE_ME"           # Resend API Key（re_ 开头）
    from: "noreply@your-domain.com"    # 已在 Resend 验证的发件地址
    from_name: "idcd"
  asynq_redis_dsn: "redis://:CHANGE_ME@REDIS_HOST:6379/0"
  workers: 4
  queues:                              # key 名必须匹配 enqueue 端实际写入的 queue
    "notifier:default": 1              # 普通通知（低优）
    "notifier:critical": 2             # 关键通知（高优）
    billing: 5                         # D5 退款重试 — 支付链路最高优

# ── Agent Gateway（mTLS 接入）───────────────────────────────────
agent_gateway:
  addr: "localhost:8443"
  ca_cert: "certs/dev-ca.crt"
  public_wss: "wss://gateway.idcd.com"   # 返回给 agent 的外部 WSS 地址
  internal_url: "http://localhost:8081"  # 服务间内部调用

# ── cert-svc 反代上游（gateway 读取）─────────────────────────────
# S2 W8: gateway 将 /v1/cert/* 反代到 cert-svc。内网链路，无 mTLS。
# 留空 = 关闭反代（S1 / 单体 gateway 部署）。
cert_svc_url: "http://localhost:8082"

# ── cert-svc 进程内配置（cert-svc 启动时直读 CERT_* env 覆盖）────
# 这里列出 yaml 形态仅作运维参考；cert-svc 实际通过 CERT_SVC_PORT /
# CERT_SVC_METRICS_PORT 等环境变量加载（apps/cert-svc/internal/config）。
cert_svc:
  port: 8082
  # Prometheus /metrics 监听端口（与主 API 端口分离，方便 ACL 限制为
  # VPN-only）。覆盖：env CERT_SVC_METRICS_PORT。
  metrics_port: 9090

# ── Scheduler ────────────────────────────────────────────────────
leader:
  key: "scheduler:leader"
  ttl: "10s"
# worker.count 在 2026-05-16 移除 (scheduler 已删 ZSET worker pool)；
# 现仅 monitor polling 在跑，并发由 poll 节拍决定，不需要配置。

# ── OAuth ────────────────────────────────────────────────────────
oauth:
  callback_base: "http://localhost:8080"  # 生产改为 https://api.idcd.com
  dingtalk:
    app_id: ""
    app_secret: ""
  feishu:
    app_id: ""
    app_secret: ""

# ── 字段级加密 ───────────────────────────────────────────────────
encryption:
  # 生成: openssl rand -hex 32
  # 生产必填；开发留空使用全零 fallback（不安全，仅限本地调试）
  field_key: ""

# ── 支付 ─────────────────────────────────────────────────────────
payment:
  enabled: false                   # true = 真实支付；false = StubProvider
  base_url: "https://payment-api.idcd.com"
  api_key: "pk_live_CHANGE_ME"
  api_secret: "sk_live_CHANGE_ME"
  webhook_secret: "whsec_CHANGE_ME"
  channel: "alipay"                # alipay | wechat_pay
  currency: "CNY"

# ── 速率限制 ─────────────────────────────────────────────────────
# 字段缺省 → 走代码内默认值：auth = 5/min/IP, twofa = 5/15min/user
# 字段只设一个 → 另一个仍走默认；可仅缩紧 max_requests 不动 window
rate_limit:
  auth:
    window: "1m"
    max_requests: 5
  twofa:
    window: "15m"
    max_requests: 5

# ── 可观测性 ─────────────────────────────────────────────────────
observability:
  prometheus_port: 9091
  otel_endpoint: ""    # OTLP gRPC，如 http://localhost:4317；空 = stdout
  loki_endpoint: ""
  sentry_dsn: ""
  telemetry:
    enabled: false
    otlp_endpoint: ""
    sampling_rate: 0.1
