# idcd 生产环境配置示例
# 复制为 /opt/idcd/config/prod.env.yaml 并填入真实值
# 此文件不入 git，只放在服务器上

database:
  main:
    dsn: "postgresql://idcd:YOUR_DB_PASSWORD@YOUR_CLOUD_DB_HOST:5432/idcd"
    max_open_conns: 20
    max_idle_conns: 5
    conn_max_lifetime: "5m"

redis:
  addr: "YOUR_CLOUD_REDIS_HOST:6379"
  password: "YOUR_REDIS_PASSWORD"
  db: 0

server:
  port: 8080
  env: "production"
  cors_origins:
    - "https://idcd.com"
    - "https://www.idcd.com"
  admin_token: "GENERATE_WITH: openssl rand -hex 32"

jwt:
  secret: "GENERATE_WITH: openssl rand -hex 32"
  access_ttl: "15m"
  refresh_ttl: "7d"

notifier:
  smtp:
    host: "smtp.resend.com"
    port: 587
    username: "resend"
    password: "re_YOUR_RESEND_API_KEY"
    from: "noreply@idcd.com"
    from_name: "idcd"
  asynq_redis_dsn: "redis://:YOUR_REDIS_PASSWORD@YOUR_CLOUD_REDIS_HOST:6379/0"
  workers: 4
  queues:
    email: 6
    webhook: 3
    default: 1

observability:
  prometheus_port: 9091
  sentry_dsn: ""

agent_gateway:
  addr: "0.0.0.0:8443"
  ca_cert: "/certs/ca.crt"

kms:
  provider: "dev_plaintext"
  key_id: ""

encryption:
  field_key: "GENERATE_WITH: openssl rand -hex 32"

oauth:
  callback_base: "https://api.idcd.com"
  dingtalk:
    app_id: ""
    app_secret: ""
  feishu:
    app_id: ""
    app_secret: ""

payment:
  enabled: true
  base_url: "https://payment-api.idcd.com"
  api_key: "pk_live_YOUR_KEY"
  api_secret: "sk_live_YOUR_SECRET"
  webhook_secret: "whsec_YOUR_SECRET"
  channel: "alipay"
  currency: "CNY"
