# idcd 生产环境配置
# 部署路径: /opt/idcd/config/prod.env.yaml（不入 git）
# 启动方式: IDCD_CONFIG=/opt/idcd/config/prod.env.yaml /bin/api
#
# 读取此文件的服务：api / notifier / gateway / scheduler
# aggregator 单独使用 config/aggregator.yaml
#
# 生成随机密钥: openssl rand -hex 32

# ── 数据库（云托管，填入云服务商连接串）──────────────────────────
database:
  dsn: "postgresql://idcd:CHANGE_ME@云DB_HOST:5432/idcd"        # scheduler 用
  main:
    dsn: "postgresql://idcd:CHANGE_ME@云DB_HOST:5432/idcd"      # api/notifier/gateway 用
    max_open_conns: 20
    max_idle_conns: 5
    conn_max_lifetime: "5m"

# ── Redis（云托管）──────────────────────────────────────────────
redis:
  addr: "云REDIS_HOST:6379"
  password: "CHANGE_ME"
  db: 0

# ── API 服务器 ───────────────────────────────────────────────────
server:
  port: 8080
  env: "production"
  admin_token: "GENERATE: openssl rand -hex 32"   # 必填，用于 /internal/admin/* 接口
  cors_origins:
    - "https://idcd.com"
    - "https://www.idcd.com"
  rp_id: "idcd.com"                               # WebAuthn Relying Party ID
  app_base_url: "https://idcd.com"                # 邮件深链接

# ── JWT ──────────────────────────────────────────────────────────
jwt:
  secret: "GENERATE: openssl rand -hex 32"        # 必填，至少 32 字节
  access_ttl: "15m"
  refresh_ttl: "7d"

# ── Notifier（Resend SMTP）──────────────────────────────────────
notifier:
  smtp:
    host: "smtp.resend.com"
    port: 587
    username: "resend"
    password: "re_CHANGE_ME"              # Resend API Key
    from: "noreply@idcd.com"             # 已在 Resend 验证的域名
    from_name: "idcd"
  asynq_redis_dsn: "redis://:CHANGE_ME@云REDIS_HOST:6379/0"
  workers: 4
  queues:
    email: 6
    webhook: 3
    default: 1

# ── Agent Gateway ────────────────────────────────────────────────
agent_gateway:
  addr: "0.0.0.0:8443"
  ca_cert: "/certs/ca.crt"               # 生产 mTLS CA 证书路径
  public_wss: "wss://gateway.idcd.com"   # 对外暴露给 agent 的 WSS 地址
  internal_url: "http://127.0.0.1:8081"

# ── Scheduler ────────────────────────────────────────────────────
leader:
  key: "scheduler:leader"
  ttl: "10s"
worker:
  count: 4

# ── OAuth ────────────────────────────────────────────────────────
oauth:
  callback_base: "https://api.idcd.com"
  dingtalk:
    app_id: ""
    app_secret: ""
  feishu:
    app_id: ""
    app_secret: ""

# ── 字段级加密 ───────────────────────────────────────────────────
encryption:
  # 生成: openssl rand -hex 32
  # 必填，不可留空；密钥丢失则加密字段永久不可读
  field_key: "GENERATE: openssl rand -hex 32"

# ── 支付 ─────────────────────────────────────────────────────────
payment:
  enabled: true
  base_url: "https://payment-api.idcd.com"
  api_key: "pk_live_CHANGE_ME"
  api_secret: "sk_live_CHANGE_ME"
  webhook_secret: "whsec_CHANGE_ME"
  channel: "alipay"
  currency: "CNY"

# ── 可观测性 ─────────────────────────────────────────────────────
observability:
  prometheus_port: 9091
  otel_endpoint: ""    # OTLP gRPC，如 http://otel-collector:4317
  loki_endpoint: ""
  sentry_dsn: ""
  telemetry:
    enabled: false
    otlp_endpoint: ""
    sampling_rate: 0.1
