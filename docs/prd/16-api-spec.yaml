    SslResponse:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              type: object
              properties:
                host: { type: string }
                port: { type: integer }
                issuer: { type: string }
                subject: { type: string }
                valid_from: { type: string, format: date-time }
                valid_until: { type: string, format: date-time }
                days_remaining: { type: integer }
                score: { type: string, enum: [A+, A, B, C, D, F] }

    # ---------- Monitors ----------
    CreateMonitorRequest:
      type: object
      required: [name, type, target, interval_sec]
      properties:
        name: { type: string, maxLength: 200 }
        type:
          type: string
          enum: [http, ping, tcping, dns, ssl, domain, icp, keyword, json, heartbeat, browser]
        target: { type: string }
        params:
          type: object
          additionalProperties: true
        interval_sec:
          type: integer
          enum: [10, 30, 60, 300, 900]
        node_selection: { $ref: '#/components/schemas/NodeSelection' }
        assertions:
          type: array
          items: { $ref: '#/components/schemas/Assertion' }
        trigger_rule:
          type: object
          properties:
            consecutive_fail: { type: integer, default: 2 }
            fail_node_quorum: { type: string, default: "2/3" }
        alert_policy_id: { type: string, nullable: true }
        tags:
          type: array
          items: { type: string }
        group_id: { type: string, nullable: true }

    UpdateMonitorRequest:
      allOf:
        - $ref: '#/components/schemas/CreateMonitorRequest'

    Monitor:
      allOf:
        - $ref: '#/components/schemas/CreateMonitorRequest'
        - type: object
          properties:
            id: { type: string, example: m_xyz }
            status: { type: string, enum: [up, down, degraded, paused] }
            last_check_at: { type: string, format: date-time }
            uptime_30d: { type: number, example: 99.95 }
            owner_id: { type: string }
            created_at: { type: string, format: date-time }

    MonitorResponse:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/Monitor' }

    MonitorListResponse:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/Monitor' }

    MonitorCheck:
      type: object
      properties:
        id: { type: string, example: mc_xyz }
        monitor_id: { type: string }
        node_id: { type: string }
        started_at: { type: string, format: date-time }
        response_ms: { type: integer }
        success: { type: boolean }
        status_code: { type: integer, nullable: true }
        error: { type: string, nullable: true }

    MonitorChecksResponse:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/MonitorCheck' }

    # ---------- Alerting ----------
    AlertPolicy:
      type: object
      properties:
        id: { type: string, example: ap_xyz }
        name: { type: string }
        rules:
          type: array
          items:
            type: object
            properties:
              match:
                type: object
                properties:
                  severity:
                    type: array
                    items: { type: string, enum: [critical, warning, info] }
                  tags_any:
                    type: array
                    items: { type: string }
                  time_window:
                    type: object
                    properties:
                      timezone: { type: string, example: Asia/Shanghai }
                      days:
                        type: array
                        items: { type: string, enum: [mon, tue, wed, thu, fri, sat, sun] }
                      start: { type: string, pattern: '^\d{2}:\d{2}$' }
                      end: { type: string, pattern: '^\d{2}:\d{2}$' }
              channels:
                type: array
                items:
                  type: object
                  properties:
                    type: { type: string, enum: [email, sms, webhook, slack, dingtalk, feishu, lark, wechatwork, telegram, voice] }
                    channel_id: { type: string }
                    to:
                      type: array
                      items: { type: string }
              delay_sec: { type: integer, default: 0 }
              repeat:
                type: object
                properties:
                  enabled: { type: boolean }
                  interval_sec: { type: integer }
                  max_count: { type: integer }
        escalation: { type: object, additionalProperties: true }
        suppression: { type: object, additionalProperties: true }
        on_recovery: { type: object, additionalProperties: true }

    AlertPolicyListResponse:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/AlertPolicy' }

    AlertEvent:
      type: object
      properties:
        id: { type: string, example: ae_xyz }
        monitor_id: { type: string }
        severity: { type: string, enum: [critical, warning, info] }
        state: { type: string, enum: [open, ack, resolved] }
        opened_at: { type: string, format: date-time }
        acked_at: { type: string, format: date-time, nullable: true }
        resolved_at: { type: string, format: date-time, nullable: true }
        message: { type: string }

    AlertEventListResponse:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/AlertEvent' }

    # ---------- Status Pages ----------
    StatusPage:
