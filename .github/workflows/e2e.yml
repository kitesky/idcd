name: E2E

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'apps/api/**'
      - 'apps/gateway/**'
      - 'lib/**'
      - 'config/**'
      - '.github/workflows/e2e.yml'
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: idcd_dev
          POSTGRES_PASSWORD: idcd_dev
          POSTGRES_DB: idcd_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U idcd_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install web deps
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium

      - name: Apply DB migrations
        run: |
          go run github.com/pressly/goose/v3/cmd/goose@latest \
            -dir lib/db/migrations/idcd_main postgres \
            "postgresql://idcd_dev:idcd_dev@127.0.0.1:5432/idcd_dev?sslmode=disable" up

      - name: Prepare CI config
        run: |
          mkdir -p config
          cat > config/dev.env.yaml <<'YAML'
          database:
            main:
              dsn: "postgresql://idcd_dev:idcd_dev@127.0.0.1:5432/idcd_dev?sslmode=disable"
              max_open_conns: 10
              max_idle_conns: 3
              conn_max_lifetime: "5m"
          redis:
            addr: "127.0.0.1:6379"
            password: ""
            db: 0
          server:
            port: 8080
            env: "development"
            admin_token: "ci_admin_token_change_me"
            cors_origins:
              - "http://localhost:3000"
          jwt:
            secret: "ci_jwt_secret_change_me"
            access_ttl: "15m"
            refresh_ttl: "7d"
          observability:
            prometheus_port: 9091
          agent_gateway:
            addr: "localhost:8443"
          kms:
            provider: "dev_plaintext"
          YAML

      - name: Start API + Gateway
        run: |
          IDCD_CONFIG=config/dev.env.yaml go run ./apps/api/cmd/api &
          echo $! > /tmp/api.pid
          IDCD_CONFIG=config/dev.env.yaml go run ./apps/gateway/cmd/gateway &
          echo $! > /tmp/gateway.pid
          # Wait for API to be ready.
          for i in {1..60}; do
            if curl -s -o /dev/null http://127.0.0.1:8080/v1/csp-report || \
               curl -s -X OPTIONS -o /dev/null http://127.0.0.1:8080/v1/auth/login; then
              echo "API ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Start web
        working-directory: apps/web
        run: |
          NODE_OPTIONS='--max-old-space-size=4096 --max-semi-space-size=128' \
            pnpm next dev --turbopack -p 3000 > /tmp/web.log 2>&1 &
          echo $! > /tmp/web.pid
          for i in {1..60}; do
            if curl -s -o /dev/null http://127.0.0.1:3000/; then
              echo "web ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Run E2E
        working-directory: apps/web
        env:
          BASE_URL: http://127.0.0.1:3000
        run: pnpm exec playwright test --reporter=list

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report/
            apps/web/test-results/
          retention-days: 7

      - name: Tail server logs on failure
        if: failure()
        run: |
          echo "=== web log ==="; tail -200 /tmp/web.log || true

      - name: Cleanup
        if: always()
        run: |
          for p in /tmp/api.pid /tmp/gateway.pid /tmp/web.pid; do
            [ -f "$p" ] && kill "$(cat "$p")" 2>/dev/null || true
          done
