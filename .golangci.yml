run:
  timeout: 5m
  go: '1.26'

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - misspell
    - gosimple
    - ineffassign
    - typecheck

linters-settings:
  errcheck:
    check-blank: false
    check-type-assertions: false

  govet:
    check-shadowing: false

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
    - path: cmd/
      linters:
        - errcheck

  max-issues-per-linter: 0
  max-same-issues: 0
